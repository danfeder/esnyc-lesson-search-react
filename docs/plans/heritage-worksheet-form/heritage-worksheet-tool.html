        <span class="entry-num">${e.num}</span>
        <span class="entry-title">${escapeHtml(e.title_text)}</span>
        <div class="entry-meta">
          ${done ? `<span class="verdict-badge ${verdict}">${verdict}</span>` : ''}
          ${e.freq_plain ? `<span class="freq-pill">${escapeHtml(e.freq_plain)}</span>` : (e.freq ? `<span class="freq-pill">${escapeHtml(e.freq)}</span>` : '')}
        </div>
        <div class="entry-actions">
          <button class="accept-btn ${acceptClass}" data-num="${e.num}" ${(!done && !canAccept) ? 'disabled' : ''}>${escapeHtml(acceptLabel)}</button>
        </div>
      </div>

      ${cascadeBannerHtml}
      ${promptHtml}
      ${advicePanelHtml}

      <div class="verdict-section">
        <div class="section-label">Your call</div>
        <div class="verdict-pills">${verdictPills}</div>
      </div>
      ${followupHtml}

      ${refineHtml}

      <details class="collapsible"><summary>Reasoning behind this proposal — project-internal, feel free to skim</summary>
        <div class="content">${escapeHtml(cleanNotes)}</div>
      </details>
      ${e.has_corpus ? `<details class="collapsible"><summary>Corpus evidence</summary>
        <div class="content">${escapeHtml(e.corpus_body)}</div>
      </details>` : ''}

      <div class="field-row" style="margin-top:6px">
        <div class="field-label-group">
          <div class="field-label">Reviewer note</div>
          <div class="field-label-tech mono">(optional)</div>
        </div>
        <input class="comment-input" data-num="${e.num}" data-field="_comment"
               value="${escapeHtml(commentVal)}" placeholder="A short note for future reviewers (saved as a comment in the export)">
      </div>
    </div>
  `;
}

function entriesForCluster(cid) {
  return entries.filter(e => e.cluster_id === cid);
}
function renderClusterSummary(cid) {
  const summarable = ['11','12','13','14','15'];
  if (!summarable.includes(cid)) return '';
  const v = state.summaries[cid] || '';
  const isFilled = v.trim().length > 0;
  return `
    <div class="cluster-summary ${isFilled ? 'filled' : ''}" data-summary-cluster="${cid}">
      <h4>Why this cluster looks the way it does</h4>
      <p>Write a few paragraphs explaining the WHY so future reviewers understand the reasoning. Touch on: hierarchy depth, the bar for country-specific values, how multi-parent ambiguity was resolved, and any deferred questions.</p>
      <textarea data-summary="${cid}" placeholder="Why did this cluster land at this hierarchy depth?

Where did you set the bar for canonicalizing a country-specific value?

How did you resolve any multi-parent ambiguity (values that could belong to more than one cluster)?

Anything to flag for the next cleanup pass or future reviewers?">${escapeHtml(v)}</textarea>
    </div>
  `;
}
function renderCluster(cid) {
  const ents = entriesForCluster(cid);
  return `
    <section class="section" id="cluster-${cid}">
      <h2 class="section-title">${escapeHtml(cluster_labels[cid])} <span class="count">— ${ents.length} entries</span></h2>
      <div class="entries-list" data-cluster="${cid}">
        ${ents.map(renderEntry).join('')}
      </div>
      ${renderClusterSummary(cid)}
    </section>
  `;
}

function render() {
  const html = renderOnboarding() + renderDecisions() + cluster_order.map(renderCluster).join('');
  document.getElementById('root').innerHTML = html;
  applyFilter();
  updateProgress();
}

function applyFilter() {
  const q = (document.getElementById('searchBox').value || '').toLowerCase();
  const mode = document.getElementById('filterSelect').value;
  for (const e of entries) {
    const node = document.getElementById('entry-' + e.num);
    if (!node) continue;
    let show = true;
    if (q) {
      const hay = (e.num + ' ' + e.title_text + ' ' + e.notes).toLowerCase();
      if (!hay.includes(q)) show = false;
    }
    const v = getField(e, 'verdict');
    const complete = entryIsComplete(e);
    if (mode === 'pending' && complete) show = false;
    if (mode === 'easy') {
      // Easy = has a clear suggested verdict AND not yet complete
      if (!e.suggested_verdict || complete) show = false;
    }
    if (mode === 'done' && !complete) show = false;
    if (mode === 'merge' && v !== 'merge') show = false;
    node.style.display = show ? '' : 'none';
  }
}

function updateProgress() {
  const totalVerdicts = entries.length;
  const doneVerdicts = entries.filter(entryIsComplete).length;
  document.getElementById('cnt-verdicts').textContent = `${doneVerdicts}/${totalVerdicts}`;
  document.getElementById('pf-verdicts').style.width = `${doneVerdicts/totalVerdicts*100}%`;
  const dDone = decisionsMeta.filter(d => (state.decisions[d.n] || '').trim().length > 0).length;
  document.getElementById('cnt-decisions').textContent = `${dDone}/5`;
  document.getElementById('pf-decisions').style.width = `${dDone/5*100}%`;
  const sDone = Object.values(state.summaries).filter(s => (s || '').trim().length > 0).length;
  document.getElementById('cnt-summaries').textContent = `${sDone}/5`;
  document.getElementById('pf-summaries').style.width = `${sDone/5*100}%`;
}

function reRenderEntry(num, opts) {
  opts = opts || {};
  const wasDone = document.getElementById('entry-' + num)?.classList.contains('done');
  const e = entries.find(x => x.num === num);
  const wrap = document.createElement('div');
  wrap.innerHTML = renderEntry(e);
  const old = document.getElementById('entry-' + num);
  if (old) {
    const newEl = wrap.firstElementChild;
    old.replaceWith(newEl);
    // Trigger flash if newly done (transitioned from not-done to done)
    if (!wasDone && newEl.classList.contains('done') && opts.flash !== false) {
      newEl.classList.add('flash-success');
      setTimeout(() => newEl.classList.remove('flash-success'), 950);
    }
  }
}

// === Event handlers ===
document.addEventListener('click', (ev) => {
  // Click on a compact-done entry header expands it inline (one-time)
  const compactHead = ev.target.closest('.entry.compact-done .entry-head');
  if (compactHead && !ev.target.closest('.accept-btn')) {
    const entryEl = compactHead.closest('.entry');
    entryEl.classList.remove('compact-done');
    return;
  }

  // --- Cascade banner: jump to a framing decision and focus its textarea ---
  const cbj = ev.target.closest('[data-action="jump-decision"]');
  if (cbj) {
    ev.preventDefault();
    const n = cbj.dataset.decisionN;
    document.getElementById('decisions-panel')?.scrollIntoView({ behavior: 'smooth' });
    setTimeout(() => {
      const ta = document.querySelector(`textarea[data-decision="${n}"]`);
      if (ta) ta.focus({ preventScroll: true });
    }, 380);
    return;
  }

  // --- Tree-toggle (expand/collapse a tree-picker cluster root) ---
  const ttog = ev.target.closest('[data-action="tree-toggle"]');
  if (ttog) {
    ev.stopPropagation();
    const num = ttog.dataset.num;
    const key = ttog.dataset.toggleKey;
    if (!window._treeExpanded) window._treeExpanded = {};
    if (!window._treeExpanded[num]) window._treeExpanded[num] = {};
    // Default-state mirrors renderTreePicker's logic (depth 0 = open)
    const node = canonicalTree.byKey.get(key);
    const parent = node ? ((node.fields.parent && node.fields.parent.value) || 'null') : 'null';
    const defaultOpen = (parent === 'null' || parent === '<to_fill>'); // approximation: only cluster roots default-open
    const cur = window._treeExpanded[num][key];
    window._treeExpanded[num][key] = (cur === undefined) ? !defaultOpen : !cur;
    reRenderEntry(num, { flash: false });
    return;
  }

  // --- Tree-node click: set parent or set merge/split/drop target ---
  const tn = ev.target.closest('.tree-node');
  if (tn && (tn.dataset.action === 'set-parent' || tn.dataset.action === 'set-followup')) {
    const num = tn.dataset.num;
    const targetKey = tn.dataset.targetKey;
    if (tn.dataset.action === 'set-parent') {
      setField(num, 'parent', targetKey);
      if (window._parentPickerOpen) window._parentPickerOpen[num] = false;
    } else {
      // followup target: figure out which field from current verdict
      const e = entries.find(x => x.num === num);
      const v = getField(e, 'verdict');
      const ff = v === 'merge' ? 'merge_into' : v === 'split' ? 'split_into' : 'drop_to';
      if (v === 'split') {
        // Append to existing list (multi-select)
        const existing = parseAliases(getField(e, ff));
        if (!existing.includes(targetKey)) existing.push(targetKey);
        setField(num, ff, stringifyAliases(existing));
      } else {
        setField(num, ff, targetKey);
        if (window._followupPickerOpen) window._followupPickerOpen[num] = false;
      }
    }
    reRenderEntry(num);
    updateProgress();
    applyFilter();
    return;
  }

  // --- [Change parent] button (toggles parent picker) ---
  const pdc = ev.target.closest('[data-action="toggle-parent-picker"]');
  if (pdc) {
    const num = pdc.dataset.num;
    if (!window._parentPickerOpen) window._parentPickerOpen = {};
    window._parentPickerOpen[num] = !window._parentPickerOpen[num];
    reRenderEntry(num, { flash: false });
    return;
  }
  // Close-parent-picker
  const cpp = ev.target.closest('[data-action="close-parent-picker"]');
  if (cpp) {
    const num = cpp.dataset.num;
    if (window._parentPickerOpen) window._parentPickerOpen[num] = false;
    reRenderEntry(num, { flash: false });
    return;
  }

  // --- [Change] followup button (toggles merge/split/drop target picker) ---
  const flc = ev.target.closest('[data-action="toggle-followup-picker"]');
  if (flc) {
    const num = flc.dataset.num;
    if (!window._followupPickerOpen) window._followupPickerOpen = {};
    window._followupPickerOpen[num] = !window._followupPickerOpen[num];
    reRenderEntry(num, { flash: false });
    return;
  }
  // Close-followup-picker
  const cfp = ev.target.closest('[data-action="close-followup-picker"]');
  if (cfp) {
    const num = cfp.dataset.num;
    if (window._followupPickerOpen) window._followupPickerOpen[num] = false;
    reRenderEntry(num, { flash: false });
    return;
  }

  // Verdict pill
  const vp = ev.target.closest('.verdict-pill');
  if (vp) {
    setField(vp.dataset.num, 'verdict', vp.dataset.verdict);
    reRenderEntry(vp.dataset.num);
    updateProgress(); applyFilter();
    return;
  }
  // Tier pill
  const tp = ev.target.closest('.tier-pill');
  if (tp) {
    setField(tp.dataset.num, 'filter_ui_tier', tp.dataset.tier);
    reRenderEntry(tp.dataset.num);
    return;
  }
  // Accept proposal button
  const ab = ev.target.closest('.accept-btn');
  if (ab) {
    const e = entries.find(x => x.num === ab.dataset.num);
    if (e.suggested_verdict) {
      setField(e.num, 'verdict', e.suggested_verdict);
      // Don't override structural fields — they're already pre-populated.
      reRenderEntry(e.num);
      updateProgress(); applyFilter();
      toast(`Confirmed § ${e.num} (verdict: ${e.suggested_verdict})`);
    }
    return;
  }
  // Tag × button
  const tx = ev.target.closest('.tag-x');
  if (tx) {
    const wrap = tx.closest('.tag-input');
    const num = wrap.dataset.num;
    const fname = wrap.dataset.field;
    const idx = parseInt(tx.dataset.idx, 10);
    const e = entries.find(x => x.num === num);
    const tags = parseAliases(getField(e, fname));
    tags.splice(idx, 1);
    setField(num, fname, stringifyAliases(tags));
    reRenderEntry(num);
    return;
  }
  // Advanced menu toggle
  if (ev.target.id === 'advBtn') {
    document.getElementById('advMenu').classList.toggle('open');
    return;
  } else {
    document.getElementById('advMenu')?.classList.remove('open');
  }
  // Onboarding
  if (ev.target.id === 'onbDismiss') {
    localStorage.setItem(ONBOARD_KEY, 'dismissed');
    ev.target.closest('.onboarding').remove();
    return;
  }
  if (ev.target.id === 'onbStartEasy') {
    document.getElementById('filterSelect').value = 'easy';
    applyFilter();
    document.getElementById('cluster-9.1')?.scrollIntoView({behavior:'smooth'});
    return;
  }
  if (ev.target.id === 'onbDecisions') {
    document.getElementById('decisions-panel').scrollIntoView({behavior:'smooth'});
    return;
  }
});

document.addEventListener('input', (ev) => {
  const t = ev.target;
  if (t.matches('.field-input, .comment-input')) {
    setField(t.dataset.num, t.dataset.field, t.value);
    return;
  }
  if (t.matches('[data-decision]')) {
    const n = t.dataset.decision;
    state.decisions[n] = t.value;
    saveState(); updateProgress();
    const item = document.querySelector(`[data-decision-item="${n}"]`);
    if (item) item.classList.toggle('filled', t.value.trim().length > 0);
    return;
  }
  if (t.matches('[data-summary]')) {
    const cid = t.dataset.summary;
    state.summaries[cid] = t.value;
    saveState(); updateProgress();
    const wrap = document.querySelector(`[data-summary-cluster="${cid}"]`);
    if (wrap) wrap.classList.toggle('filled', t.value.trim().length > 0);
    return;
  }
});
document.addEventListener('keydown', (ev) => {
  // Tag input: Enter / comma to add chip
  if (ev.target.matches('.tag-add')) {
    if (ev.key === 'Enter' || ev.key === ',') {
      ev.preventDefault();
      const wrap = ev.target.closest('.tag-input');
      const num = wrap.dataset.num;
      const fname = wrap.dataset.field;
      const e = entries.find(x => x.num === num);
      const val = ev.target.value.trim().replace(/^,|,$/g,'');
      if (!val) return;
      const tags = parseAliases(getField(e, fname));
      if (!tags.includes(val)) tags.push(val);
      setField(num, fname, stringifyAliases(tags));
      reRenderEntry(num);
      // Re-focus the (new) tag-add input
      setTimeout(() => {
        document.querySelector(`#entry-${num} .tag-add`)?.focus();
      }, 0);
      return;
    }
    if (ev.key === 'Backspace' && !ev.target.value) {
      const wrap = ev.target.closest('.tag-input');
      const num = wrap.dataset.num;
      const fname = wrap.dataset.field;
      const e = entries.find(x => x.num === num);
      const tags = parseAliases(getField(e, fname));
      if (tags.length) {
        tags.pop();
        setField(num, fname, stringifyAliases(tags));
        reRenderEntry(num);
        setTimeout(() => document.querySelector(`#entry-${num} .tag-add`)?.focus(), 0);
      }
      return;
    }
  }
  // Cmd/Ctrl+E to export
  if (['INPUT','TEXTAREA','SELECT'].includes(ev.target.tagName)) return;
  if ((ev.metaKey || ev.ctrlKey) && ev.key.toLowerCase() === 'e') {
    ev.preventDefault();
    document.getElementById('exportBtn').click();
  }
});

// Persist refine-details expand/collapse state across autosave + reload
document.addEventListener('toggle', (ev) => {
  const t = ev.target;
  if (t && t.matches && t.matches('.refine-details[data-refine-for]')) {
    const num = t.dataset.refineFor;
    entryState(num)._refineOpen = t.hasAttribute('open');
    saveState();
  }
}, true);

document.getElementById('searchBox').addEventListener('input', applyFilter);
document.getElementById('filterSelect').addEventListener('change', () => {
  localStorage.setItem(FILTER_KEY, document.getElementById('filterSelect').value);
  applyFilter();
});
const savedFilter = localStorage.getItem(FILTER_KEY);
if (savedFilter) document.getElementById('filterSelect').value = savedFilter;

// Compact-done toggle
const COMPACT_KEY = 'heritage-worksheet-compact-v2';
window._compactDone = localStorage.getItem(COMPACT_KEY) === '1';
const compactToggle = document.getElementById('compactDoneToggle');
compactToggle.checked = window._compactDone;
compactToggle.addEventListener('change', () => {
  window._compactDone = compactToggle.checked;
  localStorage.setItem(COMPACT_KEY, window._compactDone ? '1' : '0');
  // Re-render only complete entries; cheaper than full render
  for (const e of entries) {
    if (entryIsComplete(e)) reRenderEntry(e.num, {flash: false});
  }
});

// === Export ===
function quote(v) {
  if (v === null || v === undefined || v === '') return '`<to_fill>`';
  if (v === 'null') return '`null`';
  return '`' + v + '`';
}
function buildExportedMarkdown() {
  const lines = fullMd.split('\n');
  const lineMap = new Map();
  for (const e of entries) {
    for (const [fname, fdata] of Object.entries(e.fields)) {
      if (fdata.line !== null && fdata.line !== undefined) {
        lineMap.set(fdata.line, {num: e.num, field: fname});
      }
    }
  }
  const summaryLineMap = new Map();
  for (const [sec, headerLine] of Object.entries(summary_sections)) {
    summaryLineMap.set(parseInt(headerLine) + 2, sec);
  }
  const out = [];
  for (let i = 0; i < lines.length; i++) {
    const mapping = lineMap.get(i);
    if (mapping) {
      const e = entries.find(x => x.num === mapping.num);
      const fname = mapping.field;
      const cur = getField(e, fname);
      const comments = e.fields[fname].comments || [];
      const userComment = (i === e.fields.verdict.line) ? (state.entries[e.num]?._comment || '') : '';
      let line = `- **${fname}:** ${quote(cur)}`;
      if (comments.length > 0) line += ` <!-- ${comments.join(' / ')} -->`;
      if (userComment) line += ` <!-- ${userComment} -->`;
      out.push(line);
    } else if (summaryLineMap.has(i)) {
      const sec = summaryLineMap.get(i);
      const prose = (state.summaries[sec] || '').trim();
      out.push(prose ? prose : lines[i]);
    } else {
      out.push(lines[i]);
    }
  }
  // Decisions block before §9.1.1
  if (decisionsMeta.some(d => (state.decisions[d.n] || '').trim())) {
    const dec_lines = decisionsMeta.map(d => {
      const a = (state.decisions[d.n] || '').trim();
      return `**D${d.n} — ${d.label}** ${a || '_(unresolved)_'}`;
    });
    const block = '\n**Curriculum team framing decisions (filled at handoff):**\n\n' + dec_lines.join('\n\n') + '\n';
    const idx = out.findIndex(l => l.startsWith('#### 9.1.1.'));
    if (idx !== -1) out.splice(idx, 0, block);
  }
  // Follow-up insertions for merge/split/drop entries lacking the line
  const insertions = [];
  const followMap = {merge:'merge_into', split:'split_into', drop:'drop_to'};
  for (const e of entries) {
    const v = getField(e, 'verdict');
    const ff = followMap[v];
    if (!ff) continue;
    if (e.fields[ff] && e.fields[ff].line !== null && e.fields[ff].line !== undefined) continue;
    const fv = getField(e, ff);
    if (!fv) continue;
    insertions.push({line: e.fields.verdict.line, text: `- **${ff}:** ${quote(fv)}`});
  }
  insertions.sort((a,b) => b.line - a.line);
  for (const ins of insertions) out.splice(ins.line + 1, 0, ins.text);
  return out.join('\n');
}

document.getElementById('exportBtn').addEventListener('click', () => {
  const md = buildExportedMarkdown();
  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '2026-05-10-metadata-rebuild-stage1-heritage-worksheet.md';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast('Saved & exported');
});

// === Import ===
document.getElementById('importBtn').addEventListener('click', () => {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.md,text/markdown,text/plain';
  inp.addEventListener('change', () => {
    const f = inp.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      const text = reader.result;
      const tlines = text.split('\n');
      let imported = 0;
      const LABELED = /^- \*\*(\w+):\*\*\s*(.*)$/;
      const entryStart = (n) => tlines.findIndex(l => l.startsWith(`#### ${n}. `));
      for (const e of entries) {
        const start = entryStart(e.num);
        if (start === -1) continue;
        let end = tlines.length;
        for (let j = start + 1; j < tlines.length; j++) {
          if (tlines[j].startsWith('#### ') || tlines[j].startsWith('## ') || tlines[j].startsWith('### ')) { end = j; break; }
        }
        for (let j = start + 1; j < end; j++) {
          const m = tlines[j].match(LABELED);
          if (m) {
            const fname = m[1]; const raw = m[2];
            const vm = raw.match(/^`([^`]*)`/);
            const val = vm ? vm[1] : raw.trim();
            if (val && val !== '<to_fill>') { setField(e.num, fname, val); imported++; }
          }
        }
      }
      render();
      toast(`Imported ${imported} field values`);
    };
    reader.readAsText(f);
  });
  inp.click();
});

// === Reset ===
document.getElementById('clearBtn').addEventListener('click', () => {
  if (!confirm('Reset all your answers? This can\'t be undone (unless you have a previous export to re-import).')) return;
  state = { entries:{}, decisions:{}, summaries:{} };
  saveState(); render();
  toast('Reset');
});

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 1800);
}

render();

</script>

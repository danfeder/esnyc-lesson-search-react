drift form fold into \"south-asian\"?"}, {"num": "12.1", "title": "Americas (170)", "title_text": "Americas", "freq": "170", "cluster": "\u00a712 Americas", "cluster_id": "12", "fields": {"canonical_key": {"value": "americas", "cascade": "", "plain_cascade": "", "comments": [], "line": 1030}, "surface_label": {"value": "Americas", "cascade": "", "plain_cascade": "", "comments": [], "line": 1031}, "parent": {"value": "null", "cascade": "", "plain_cascade": "", "comments": [], "line": 1032}, "filter_ui_tier": {"value": "top", "cascade": "", "plain_cascade": "", "comments": [], "line": 1033}, "verdict": {"value": "<to_fill>", "cascade": "", "plain_cascade": "", "comments": [], "line": 1034}, "aliases": {"value": "[]", "cascade": "", "plain_cascade": "", "comments": [], "line": 1035}}, "has_corpus": true, "corpus_summary": "Corpus evidence (170 active lessons; ~28 genuinely pan-Americas or cross-continent, ~142 country/sub-region chains)", "corpus_body": "- **`1IxkjYeOmhz2M_MC_Cbzj8vJMnLNVA5UX56CGi6E_Ap8` \u2014 \"Food Photovoice Lesson Four: What the World Eats\"** (Cohort A; tagged `[Asian, African, European, Americas]`): Summary \u2014 \"Students will look at photographs of families from around the world and their food for the week making comparisons about amount, cost and type of food.\" Body \u2014 \"This week, we are going to look at food and families around the world. We will look at photos that show us a family that lives somewhere in the world and what this family eats in an entire week...\" `Americas` carries the entire Western Hemisphere alongside three other continents in a single explicit world-comparison lesson \u2014 no sub-region/country children, and none would be appropriate.\n- **`1G1tJ-_RY56dsObDj_75hm3xBoL5Mgh9Nj44p3dEqlWk` \u2014 \"Rice & Beans 2-ways\"** (Cohort A; tagged `[Cuban, Jamaican, Caribbean, Latin American, Americas]`): \"Today we are going to create two Rice and Beans recipes from two different countries. We will be making a Cuban-style rice and beans recipe, and Jamaican-style rice and beans recipe.\" Two unrelated Caribbean countries in one lesson; `Americas` is a redundant ancestor here but the lesson is structurally pan-Caribbean/cross-country, which the worksheet's parent-chain shape preserves.\n- **`13FPqZmdrIamQqrzLZUoeLt8CGTnP3vNJv_C_q5gyxjA` \u2014 \"The Story of the 3 sisters\"** (Cohort B variant; tagged `[Lenape, Indigenous, Americas]` \u2014 no `North American` parent): Body \u2014 \"Who are the Lenape? They are an Indigenous people who used to inhabit the eastern seaboard... The Lenape planted the 3 sisters because they knew they would grow best together.\" Single-people Indigenous lesson reaching `Americas` directly without a `North American` geographic parent, illustrating the inconsistent diaspora-vs-sub-region tagging pattern (see Notes).\n\n**Tagging pattern:** Cohort A (~28/170, ~16%) is meaningfully pan-Americas in three shapes \u2014 (i) world-comparison lessons that explicitly tag 2-4 continents; (ii) cross-Americas-country lessons that tag 2+ sub-regions (Rice & Beans 2-ways spans Cuban + Jamaican; History of Tex-Mex spans Mexican + North American; Black Bean Dip spans Mexican + Caribbean); and (iii) genuine pan-region framings with no specific country (Descriptive Language, Our Garden and Kitchen Community \u2014 both tag `Caribbean + Latin American + Americas` describing community-cultural breadth rather than a specific cuisine). Cohort B (~142/170, ~84%) uses `Americas` as the redundant root of a Country \u2192 Sub-region \u2192 `Americas` ancestry chain. Audit signal: a small set of edge cases over-tag `Americas` with multiple Americas sub-regions despite the body content being about a different region \u2014 e.g., `Bats & Banana Pancakes` is tagged `Caribbean + Latin American + Americas` though SE Asia is the actual subject; `Flies & Fruit` similarly mixes South Asian + Caribbean + Latin American + Americas.", "notes": "Cluster root for the Americas cluster (highest-frequency cluster root in the corpus at 170 lessons). Cohort A's ~28 lessons confirm `Americas` as a meaningful pan-region tag, not under-tagging. Cohort B's ~142 lessons use `Americas` as hierarchical-parent ancestry. **Cross-cluster diaspora interaction is INCONSISTENT in the corpus** (per TEST DB direct queries 2026-05-10): African American lessons carry `North American` 16/24 of the time (67%); Indigenous 19/24 (79%); Lenape 3/7 (43%); Native American 3/5 (60%). The remaining diaspora/Indigenous lessons skip `North American` entirely and reach `Americas` only via the identity tag's parent chain. Curriculum team should decide whether the canonical schema requires the geographic parent be present on all diaspora-tagged lessons (Stage 2 backfill) or treats `Americas` as the canonical anchor for identity-tagged lessons (status quo). Filter-UI tier `top` is the cluster-root default. Stage 2 audit signal: review the over-tagged Asian-cluster lessons that also carry `Caribbean + Latin American + Americas` (Bats & Banana Pancakes, Flies & Fruit) \u2014 candidates to drop the Americas sub-region tagging entirely.", "recommendation": null, "suggested_verdict": "keep", "easy_confirm": false, "advice": {"primary": "keep", "primary_text": "Keep this value as-is. The structural fields are already proposed \u2014 just confirm.", "alternative": null, "alternative_text": null}, "freq_plain": "170 lessons", "prompt": "Should \"Americas\" stay as a canonical value?"}, {"num": "12.2", "title": "North American (83)", "title_text": "North American", "freq": "83", "cluster": "\u00a712 Americas", "cluster_id": "12", "fields": {"canonical_key": {"value": "north-american", "cascade": "", "plain_cascade": "", "comments": [], "line": 1053}, "surface_label": {"value": "North American", "cascade": "", "plain_cascade": "", "comments": [], "line": 1054}, "parent": {"value": "americas", "cascade": "", "plain_cascade": "", "comments": [], "line": 1055}, "filter_ui_tier": {"value": "top", "cascade": "", "plain_cascade": "", "comments": [], "line": 1056}, "verdict": {"value": "<to_fill>", "cascade": "", "plain_cascade": "", "comments": [], "line": 1057}, "aliases": {"value": "[]", "cascade": "", "plain_cascade": "", "comments": [], "line": 1058}}, "has_corpus": true, "corpus_summary": "Corpus evidence (83 active lessons; cohort breakdown ~23 African American + West African diaspora, ~23 Indigenous-cluster, 2 Mexican cross-tag, ~35 USA-generic)", "corpus_body": "- **`1bjiET8ffFpU5_gCMgJBiTDPuHhE0lCPGBnv72LXzrW4` \u2014 \"Black History Month: Ice Cream Heroes\"** (African American cohort; tagged `[African American, North American, Americas]`): \"Ice cream was first introduced to America by a Black chef named James Hemings. James Hemings was enslaved by the American president, Thomas Jefferson until he became free at the age of 30. He studied cooking in France and brought many French recipes to America...\" Banana-only ice cream lesson framed around three Black culinary innovators (Hemings, Augustus Jackson, Alfred Cralle). `North American` here functions as the geographic anchor for the African American diaspora story.\n- **`12ZjWQaqW6hOPDo16zi9PN3iG92jI4KLz` \u2014 \"Blue Corn Cookies\"** (Indigenous cohort; tagged `[Native American, North American, Americas]`): \"Today you are going to learn about a food Native Americans/American Indians eat called CORN... This is Blue Corn, blue is utilized a lot by some Tribes of the American West like the Hopi and Navajos...\" Tribe-specific in body (Hopi, Navajo) but heritage tag stops at the pan-Indigenous level; `North American` as geographic parent under which `Native American` sits.\n- **`1ldS7zEG960hNqyamfSPAbO_mKmmRpHvJ` \u2014 \"History of Tex-Mex Food\"** (Mexican cross-cluster cohort; tagged `[Mexican, Latin American, Americas, North American]`): \"Today we are going to learn about Tex-Mex food. Based on the name can you tell where in the world Tex-Mex is from? (Texas and Mexico). Tex-Mex is considered fusion food because it combines foods from different cultures/communities.\" Carries BOTH `Latin American` (v3 cultural-cluster parent) AND `North American` (geographic parent) \u2014 the only sub-region in the corpus where v3 surfaces a dual-parent chain on the same lesson. Both Mexican-tagged North-American rows (Tex-Mex, Vegetarian Quesadillas) demonstrate this pattern.\n\n**Tagging pattern:** `North American` decomposes into four cohorts with very different semantic loads (cohort sizes are exclusive-bucketed by tag-presence priority: AA/WA diaspora > Indigenous-cluster > Mexican > residual). **Cohort A \u2014 African American / West African diaspora (~23 lessons):** 15 carry `African American` only, 7 carry `West African` only, 1 carries both; framings include Black History Month, Juneteenth, Hoppin' John, Soul Food, the Black Panther Party. **Cohort B \u2014 Indigenous / Native American / Lenape / Haudenosaunee (~23 lessons):** dominated by Three Sisters / corn / Thanksgiving framing; uses `North American` as the standard hierarchical parent above the indigenous-people tags. **Cohort C \u2014 Mexican (2 lessons):** Tex-Mex and Vegetarian Quesadillas; both carry the dual `Latin American + North American` parent chain, acknowledging Mexico's geographic placement. **Cohort D \u2014 USA-generic residual (~35 lessons):** pure \"American\" cooking-school dishes (mac & cheese, apple pie, pumpkin muffins, ketchup, cranberry oat cookies), historical-period lessons (Civil War, Colonial NY, Plantations & Industrial Ag), and US-school-garden / NYC-specific content (Honeybee Man, Guerilla Gardening, Alice Waters, Michelle Obama) with no specific ethnic anchor.", "notes": "v3 canonical sub-region. Filter-UI tier `top` proposed by frequency (83 lessons, well above the \u226540 threshold) and cluster-parent role. **Cross-cluster diaspora interaction is partial, not uniform** \u2014 only 67% of African American lessons and 79% of Indigenous lessons in the corpus carry `North American` as a parallel tag (per \u00a712.1 Notes; verified by direct TEST DB queries 2026-05-10). The 35 USA-generic lessons (Cohort D) raise an open structural question: should there be a `United States` country canonical under `North American`, or is \"American cooking-school\" content best left as a `North American` direct-child cohort without further canonical structure? v3 has no `American`/`United States` country tag; the corpus has none either. This question is not directly framed by any of the 5 \u00a712 cluster decisions \u2014 worth curriculum-team consideration as a candidate decision-summary item at handoff. `Cajun/Creole` (v3-canonical-corpus-absent) currently lives in cross-cluster \u00a79.1; \u00a712 decision #5 considers whether to move it under `North American` here, possibly as a child of the new `southern-united-states` sub-region (\u00a712.17). Stage 2 audit signal: the Mexican / Latin American dual-tag pattern (2 lessons) is the only place where v3 surfaces conflicting cluster parents \u2014 both Tex-Mex and Vegetarian Quesadillas carry the dual chain, suggesting the dual-parent pattern is intentional rather than a tagging error.", "recommendation": null, "suggested_verdict": "keep", "easy_confirm": false, "advice": {"primary": "keep", "primary_text": "Keep this value as-is. The structural fields are already proposed \u2014 just confirm.", "alternative": null, "alternative_text": null}, "freq_plain": "83 lessons", "prompt": "Should \"North American\" stay as a canonical value?"}, {"num": "12.3", "title": "Latin American (77)", "title_text": "Latin American", "freq": "77", "cluster": "\u00a712 Americas", "cluster_id": "12", "fields": {"canonical_key": {"value": "latin-american", "cascade": "", "plain_cascade": "", "comments": [], "line": 1076}, "surface_label": {"value": "Latin American", "cascade": "", "plain_cascade": "", "comments": [], "line": 1077}, "parent": {"value": "americas", "cascade": "", "plain_cascade": "", "comments": [], "line": 1078}, "filter_ui_tier": {"value": "top", "cascade": "", "plain_cascade": "", "comments": [], "line": 1079}, "verdict": {"value": "<to_fill>", "cascade": "", "plain_cascade": "", "comments": [], "line": 1080}, "aliases": {"value": "[]", "cascade": "", "plain_cascade": "", "comments": [], "line": 1081}}, "has_corpus": true, "corpus_summary": "Corpus evidence (77 active lessons; 38 with `Mexican`, 24 with no country tag, 4 with `Puerto Rican`, 11 distinct lessons with other-LA-country tags \u2014 2 Cuban + 1 Jamaican + 2 Salvadoran + 2 Honduran + 2 Peruvian + 1 Brazilian + 1 Ecuadorian + 1 Guyanese = 12 tag-appearances but 11 distinct lessons since Rice & Beans 2-ways double-counts as Cuban + Jamaican)", "corpus_body": "- **`1u84NuJq0TStf_mZlUtht2OjNnf8bKkSbBuwEBkDSCfI` \u2014 \"Foods From Around the World: Mexico\"** (Mexican cohort; tagged `Mexican + Latin American + Americas`): Summary \u2014 \"Students will do a reading and watch a video about the culture, geography, and typical ingredients from Mexico, as well as how this food culture is present in New York City.\" Unambiguous country-specific lesson; `Latin American` here functions as parent-chain redundancy under `Mexican`, mirroring the East Asian Cohort B pattern.\n- **`1fSCWUvOjhGHy2TYYvy7rnzx6tL9KS8CRo2A71txuuNw` \u2014 \"Literary Sancocho\"** (no-country cohort; tagged `Latin American + Americas` only): Body explicitly frames the dish pan-regionally \u2014 \"Today we are going to make sancocho, which is a Latin American soup, that is made up of a variety of ingredients.\" No country anchor. Genuinely Cohort A \u2014 the lesson author chose a multi-country dish deliberately. Compare with **`1q1icjk5Pgdtqp1EFwU7vNmd07SzrnWfeAYTYqIs59ag` \u2014 \"Three Sister Arepas\"** (also no-country, tagged `Latin American + Americas + Indigenous`), where the dish (arepas) is in fact Colombian/Venezuelan-specific \u2014 that's a missing-country tag, not a deliberate pan-LA choice.\n- **`1rwjyCJ7i7WelQhfAVmxP_8kx-8no7KdmE94v0ExqNRw` \u2014 \"Making Tostones\"** (Puerto Rican cohort; tagged `Puerto Rican + Caribbean + Latin American + Americas`): Body offers the corpus's own articulation of the LA/Caribbean overlap \u2014 \"Tostones are made in many different Latin American and Caribbean countries like Puerto Rico, Jamaica, Nicaragua, Cuba, Florida, Honduras and Venezuela.\" All 4 PR lessons in the corpus carry BOTH `Caribbean + Latin American` simultaneously \u2014 the corpus does not treat the two as alternative placements; it dual-codes.\n\n**Tagging pattern:** Cohort B (53 distinct lessons with at least one country tag \u2014 Mexican 38 + Puerto Rican 4 + 11 distinct other-LA-country lessons) is highly consistent: country tag + `Latin American` + `Americas` is the standard chain. Cohort A (24 no-country) is mixed: roughly half are genuine pan-LA framings (Sancocho, Literary Sancocho, generic Empanadas, \"Tastes Around the World,\" cultures-unit overviews); the other half are under-tagged country-specific lessons (arepas without Colombian/Venezuelan; \"Harvesting Friends / Cosechando Amigos\" with no country). One mis-tag surfaces: `1mAI2VtQntfWhUtIEKT1xP6Q028Hx-Jyqx_Xr-V2vWkI` (\"Empanadas\") carries `Latin American + Spanish + Mediterranean + European` based on a single body sentence noting empanada origins in Spain \u2014 over-tagged from the European parent chain. Notably, `Latin American` shows partial overlap with `Caribbean` for 6 lessons (all 4 Puerto Rican rows + `Black Bean Dip (Mobile Education)` Mexican-but-also-Caribbean + `Rice & Beans 2-ways` Cuban/Jamaican dual) \u2014 the corpus encodes Caribbean and Latin American as overlapping rather than mutually exclusive regions.", "notes": "v3 canonical sub-region. Filter-UI tier `top` proposed by frequency (77 lessons, well above the \u226540 threshold). Cohort split: 53 country-anchored distinct lessons (Mexican-dominant at 38, then 4 Puerto Rican + 11 other-LA-country distinct lessons) vs 24 no-country (roughly half deliberate pan-LA, half under-tagged country-specific lessons). The corpus DOES support v3's Latin American placement for Puerto Rican \u2014 all 4 PR lessons dual-code as `Puerto Rican + Caribbean + Latin American + Americas` simultaneously, and \"Making Tostones\" itself articulates the LA/Caribbean overlap in lesson body text. Curriculum team should decide whether the hierarchy artifact treats Caribbean \u2282 Latin American, Caribbean as sibling sub-region with shared members, or models Puerto Rico as a dual-parent leaf \u2014 the corpus pattern points to dual-parent. Stage 2 audit signals: (1) arepa lessons (Three Sister Arepas + Three Sisters Empanadas) need `Colombian`/`Venezuelan` country tags; (2) empanada lessons over-tagged with `Spanish + European` chain based on single body sentence about Spanish origins; (3) Cohort A no-country rows mixing in `Asian` sub-regions (Bats & Banana Pancakes tagged `Southeast Asian + Caribbean + Latin American`; Flies & Fruit tagged `South Asian + Caribbean + Latin American`) need a focused re-tag pass \u2014 likely artifacts of v3 multi-cuisine tagging on weakly-cultural lessons.", "recommendation": null, "suggested_verdict": "keep", "easy_confirm": false, "advice": {"primary": "keep", "primary_text": "Keep this value as-is. The structural fields are already proposed \u2014 just confirm.", "alternative": null, "alternative_text": null}, "freq_plain": "77 lessons", "prompt": "Should \"Latin American\" stay as a canonical value?"}, {"num": "12.4", "title": "Caribbean (17)", "title_text": "Caribbean", "freq": "17", "cluster": "\u00a712 Americas", "cluster_id": "12", "fields": {"canonical_key": {"value": "caribbean", "cascade": "", "plain_cascade": "", "comments": [], "line": 1099}, "surface_label": {"value": "Caribbean", "cascade": "", "plain_cascade": "", "comments": [], "line": 1100}, "parent": {"value": "americas", "cascade": "", "plain_cascade": "", "comments": [], "line": 1101}, "filter_ui_tier": {"value": "sub", "cascade": "", "plain_cascade": "", "comments": [], "line": 1102}, "verdict": {"value": "<to_fill>", "cascade": "", "plain_cascade": "", "comments": [], "line": 1103}, "aliases": {"value": "[]", "cascade": "", "plain_cascade": "", "comments": [], "line": 1104}}, "has_corpus": true, "corpus_summary": "Corpus evidence (17 active lessons; 11 in Cohort 1 \u2014 7 country-tagged with hierarchy carry-up + 4 cross-cluster carry-ins; 4 pan-Caribbean / no-country; 2 Callaloo cross-cluster acknowledgments)", "corpus_body": "- **`18b977UbveLAzs1crIsZ1Jj9GZIQw5f-ACgtgpM35cmw` \u2014 \"Arroz con Gandules\"** (tagged `Puerto Rican + Caribbean + Latin American + Americas`): Summary \u2014 \"Students will make arroz con gandules, a recipe from Puerto Rico, and a salad with cabbage, carrot, and apple.\" Body keywords explicitly list \"Hispanic/Latinx heritage, Caribbean, Puerto Rico\". All 4 Puerto Rican lessons in the corpus follow this exact shape \u2014 they carry BOTH `Caribbean` AND `Latin American` simultaneously. The v3 baseline's \"PR under Latin American not Caribbean\" choice is contradicted by every PR lesson in the actual corpus.\n- **`1G1tJ-_RY56dsObDj_75hm3xBoL5Mgh9Nj44p3dEqlWk` \u2014 \"Rice & Beans 2-ways\"** (tagged `Cuban + Jamaican + Caribbean + Latin American + Americas`): Body \u2014 \"Today we are going to create two Rice and Beans recipes from two different countries. We will be making a Cuban-style rice and beans recipe, and Jamaican-style rice and beans recipe.\" Multi-country pan-Caribbean lesson where Cuban + Jamaican both tag, and `Caribbean` legitimately functions as the joining parent \u2014 also paired with `Latin American` (the Cuban tag pulls it in).\n- **`1xA88OeHAL5csyB1zfUwvQaibMNdryE7c` \u2014 \"Bats & Banana Pancakes\"** (tagged `Southeast Asian + Asian + Caribbean + Latin American + Americas`): Body \u2014 \"Bananas originated in Southeast Asia, in the jungles of Malaysia, Indonesia or the Philippines... Bananas constitute a significant portion of the export revenues for many Latin American and Caribbean countries.\" The lesson is ABOUT bat-pollinator biology and banana economics, not Caribbean foodways \u2014 `Caribbean` was tagged for a one-sentence mention of Latin American/Caribbean banana exports. Clear over-tagging from a single content cue.\n\n**Tagging pattern:** Three distinct cohorts (totals verified by direct TEST DB enumeration 2026-05-10). **(1) Country-tagged with hierarchy carry-up + cross-cluster carry-ins (11 distinct Cohort 1 lessons total):** 7 country-tagged distinct lessons (8 country tag-appearances since Rice & Beans 2-ways dual-tags as Cuban + Jamaican) \u2014 4 Puerto Rican + 2 Jamaican (Plantain Chips with Jerk Seasoning + Rice & Beans 2-ways) + 1 Cuban (Rice & Beans 2-ways \u2014 same lesson as one Jamaican) + 1 Guyanese (Guyanese Curried Chickpeas), plus 4 cross-cluster Caribbean carry-ins \u2014 \"Black Bean Dip\" (Mexican + Caribbean, body cites \"popular in Costa Rica, Mexico, Cuba\"), \"Bats & Banana Pancakes\" (Southeast Asian + Caribbean, over-tag), \"Flies & Fruit\" (South Asian + Caribbean, similar over-tag), and \"New Years Food Traditions\" (East Asian + African + European + Caribbean + Americas, multi-continent world-tour). Of these, **every single Puerto Rican lesson carries `Caribbean` AND `Latin American` together** \u2014 the corpus does NOT respect the v3 either/or split. **(2) Pan-Caribbean / country-absent (4 lessons):** \"Foods From Around the World: Caribbean Islands\", \"Food Memories\", \"Descriptive Language\", \"Our Garden and Kitchen Community\" \u2014 `Caribbean` operates as the primary heritage tag without a country, sometimes genuinely regional, sometimes inheriting from incidental recipe choice. **(3) Cross-cluster acknowledgment (2 lessons):** \"Callaloo\" + \"Middle School Family Cooking Night: Callaloo\" tag `Caribbean + Americas + West African + African` \u2014 explicitly acknowledging the dish's West African diasporic origin alongside its Caribbean home. Net: `Caribbean` legitimately functions as both a parent (when paired with country tags) and as a primary regional tag (when no country is specified); the v3 placement of Puerto Rican under Latin American (Spanish-speaking axis) is empirically rejected by 4/4 PR rows in the corpus.", "notes": "v3 canonical sub-region. **Puerto Rican placement signal is decisive: 4/4 PR lessons carry BOTH `Caribbean` AND `Latin American` simultaneously** \u2014 the corpus has never respected v3's geographic-vs-Spanish-speaking either/or framing; in practice PR sits in both subtrees at once. This surfaces multi-parent membership as an open schema question \u2014 Session 59 design decision #1 (\"2-level-flexible parent chains\") governs hierarchy depth, not multi-parent membership; the current per-entry shape is single-parent (Notes-level flag here is the interim accommodation; adding a `parents:` plural field would be a future schema/worksheet decision). Filter-UI tier `sub` proposed (17 lessons, between sub and top thresholds). Cluster decision: curriculum team may promote to `top` given v3 canonical status + role as parent for 4 country-specific tags (Puerto Rican \u00d7 4 [multi-parent shared with Latin American] + Jamaican \u00d7 2 + Cuban \u00d7 1 [Rice & Beans 2-ways, dual-tagged with Jamaican] + Guyanese \u00d7 1 = 8 country tag-appearances across 7 distinct lessons; plus 4 cross-cluster Caribbean carry-ins, totaling Cohort 1's 11 distinct lessons). Stage 2 audit signals: (a) \"Bats & Banana Pancakes\" should drop `Caribbean + Latin American + Americas` \u2014 a single sentence about banana export economies does not make a banana-and-bats biology lesson a Caribbean food lesson; (b) \"Descriptive Language\" and \"Our Garden and Kitchen Community\" carry `Caribbean + Latin American + Americas` with no body content surfacing a clear regional framing; (c) the two Callaloo `Caribbean + West African` pairings are intentional and worth preserving as the template for diaspora-aware tagging. Trinidadian, Haitian, Bahamian, and Dominican are all zero-corpus \u2014 none surface even adjacent to the 4 pan-Caribbean lessons.", "recommendation": null, "suggested_verdict": "keep", "easy_confirm": false, "advice": {"primary": "keep", "primary_text": "Keep this value as-is. The structural fields are already proposed \u2014 just confirm.", "alternative": null, "alternative_text": null}, "freq_plain": "17 lessons", "prompt": "Should \"Caribbean\" stay as a canonical value?"}, {"num": "12.5", "title": "Mexican (38)", "title_text": "Mexican", "freq": "38", "cluster": "\u00a712 Americas", "cluster_id": "12", "fields": {"canonical_key": {"value": "mexican", "cascade": "", "plain_cascade": "", "comments": [], "line": 1122}, "surface_label": {"value": "Mexican", "cascade": "", "plain_cascade": "", "comments": [], "line": 1123}, "parent": {"value": "latin-american", "cascade": "", "plain_cascade": "", "comments": [], "line": 1124}, "filter_ui_tier": {"value": "sub", "cascade": "", "plain_cascade": "", "comments": [], "line": 1125}, "verdict": {"value": "<to_fill>", "cascade": "", "plain_cascade": "", "comments": [], "line": 1126}, "aliases": {"value": "[]", "cascade": "", "plain_cascade": "", "comments": [], "line": 1127}}, "has_corpus": true, "corpus_summary": "Corpus evidence (38 active lessons tagged with `Mexican`)", "corpus_body": "- **`1zbfn_WweqPwJD_we1vyGzaVTVLRvtXOaICLEpKwHxjg` \u2014 \"Tamales\":** \"These tamales are from Mexico, but many of Mexico's neighboring countries also make tamales... Tamales are a food tradition from Mexico. They can take a long time to prepare, so they are usually prepared on very special days, like Christmas, New Year's, Mexican Independence Day, or birthdays.\" Masa harina + corn husks + bell pepper / tomato / onion / mozzarella filling; lesson explicitly frames tradition as the word of the day and invites students to share their own family food traditions.\n- **`1ldS7zEG960hNqyamfSPAbO_mKmmRpHvJ` \u2014 \"History of Tex-Mex Food\":** \"Today we are going to learn about Tex-Mex food. Based on the name can you tell where in the world Tex-Mex is from? (Texas and Mexico). Tex-Mex is considered fusion food because it combines foods from different cultures/communities. If there is a map locate where Texas and Mexico are \u2014 take note of proximity.\" Students read a Tex-Mex history article and make enchiladas. Heritage chain `[Mexican, Latin American, Americas, North American]` is the cross-cluster signal that distinguishes this lesson and \"Vegetarian Quesadillas\" from the cuisine-pure majority.\n- **`1lsIXKwRddBM5Qvz6JMAd7BC78EHSU5jOiFd4vmpvP_4` \u2014 \"Corn and the Aztec Empire\":** \"You all read an article about the Aztec Empire... what food was very important during this time? Corn, which is a very versatile vegetable, was used for most meals. Today we will be making atole, which is a creamy dish made from corn flour that can be consumed as a drink or with a spoon. Atole is something that has been eaten since ancient times...\" 7th grade winter lesson explicitly bridges pre-Columbian Mesoamerican history to modern Mexican cuisine.\n\n**Tagging pattern:** Tagging is semantically clean \u2014 every sampled lesson has a recognizable Mexican thread (cuisine, ingredient, history, or geography). The cluster is salsa- and corn-heavy: ~9 of 38 are salsa variants (Garden Salsa, Harvest Salsa \u00d7 4 incl. Mobile Education variants, Pico de Gallo, Summer Harvest Salsa, Top Chef Salsa, Salsa Toast \u00d7 2, September Salsa Toasts), ~6 are corn dishes (esquites \u00d7 3, Mexican Street Corn Salad \u00d7 1, atole, Three Sisters tortilla/enchilada/taco lessons), and the remainder spans tacos, tamales, quesadillas, guacamole, agua fresca, jicama slaw, empanadas, amaranth, and burrito bowls. Three lessons frame Mexico through Hispanic/Latinx Heritage Month rather than country cuisine specifically (Esquites \u00d7 2 + Foods From Around the World: Mexico). One lesson \u2014 \"Farm Workers & Pesticides\" \u2014 uses the Mexican tag to frame Cesar Chavez and migrant farm worker activism rather than cuisine, but stays plausibly within heritage scope.", "notes": "v3 canonical country, parent = Latin American. Biggest country in the Americas cluster and one of the cleanest signals in the corpus \u2014 no false positives in the sample. Three observations: (1) **No sub-region detail in lesson bodies** \u2014 no Yucatecan / Oaxacan / Sinaloan / Sonoran framing surfaces; the only sub-style that appears is `Tex-Mex` (2 lessons), correctly cross-tagged to `North American` and behaving as a Mexican-American fusion category rather than a Mexico-internal region. (2) **Cross-cluster tagging is mostly principled but has 2 looser cases.** `3 Sisters Tacos` carries `[Lenape, Indigenous, Mexican, Latin American, Americas]` \u2014 defensible (Three Sisters agriculture spans Mesoamerican and Indigenous North American traditions). `Empanadas & Corn Salad` carries `[..., Mexican, Spanish, European]` for the colonial-fusion angle, also defensible. Looser: `Black Bean Dip` adds `Caribbean` (no Caribbean framing in the summary), and `September Salsa Toasts` adds `[Italian, European]` (likely noise from the \"toast\" element, weakest fit in the cluster). (3) **One geography-only lesson** \u2014 `Monarch Migration` uses `Mexican` because monarchs overwinter in Mexico, not because of cuisine or culture; the lesson body literally writes `Tags: Mexico, North America`. Borderline for a heritage tag but raises the question of whether `culturalHeritage` should accept geographic-place tagging. Flag for the curriculum team.", "recommendation": null, "suggested_verdict": "keep", "easy_confirm": false, "advice": {"primary": "keep", "primary_text": "Keep this value as-is. The structural fields are already proposed \u2014 just confirm.", "alternative": null, "alternative_text": null}, "freq_plain": "38 lessons", "prompt": "Should \"Mexican\" stay as a canonical value?"}, {"num": "12.6", "title": "Puerto Rican (4)", "title_text": "Puerto Rican", "freq": "4", "cluster": "\u00a712 Americas", "cluster_id": "12", "fields": {"canonical_key": {"value": "puerto-rican", "cascade": "", "plain_cascade": "", "comments": [], "line": 1145}, "surface_label": {"value": "Puerto Rican", "cascade": "", "plain_cascade": "", "comments": [], "line": 1146}, "parent": {"value": "latin-american", "cascade": "", "plain_cascade": "", "comments": [], "line": 1147}, "filter_ui_tier": {"value": "sub", "cascade": "", "plain_cascade": "", "comments": [], "line": 1148}, "verdict": {"value": "<to_fill>", "cascade": "", "plain_cascade": "", "comments": [], "line": 1149}, "aliases": {"value": "[]", "cascade": "", "plain_cascade": "", "comments": [], "line": 1150}}, "has_corpus": true, "corpus_summary": "Corpus evidence (4 active lessons tagged with `Puerto Rican` \u2014 full cohort read; all 4 dual-coded as Caribbean AND Latin American)", "corpus_body": "- **`18b977UbveLAzs1crIsZ1Jj9GZIQw5f-ACgtgpM35cmw` \u2014 \"Arroz con Gandules\":** \"Explain that we are making a recipe from Puerto Rico today. Show it on the map and let them know that it is part of the United States... arroz con gandules, rice and pigeon peas, is considered by some to be the national dish of Puerto Rico... adobo seasoning is a very important part of Puerto Rican cooking, and we are going to be making our own adobo seasoning mix today.\" Lesson body tags list \"Hispanic/Latinx heritage, Caribbean, Puerto Rico.\" Heritage array: `[\"Puerto Rican\", \"Caribbean\", \"Latin American\", \"Americas\"]`.\n- **`1VShcRmcQCpjPrrltCpytiHeuAgHuIb311EOIoSctnmU` \u2014 \"Arroz con Gandules / Apple Jicama Slaw\":** \"Show them Puerto Rico on the map and let them know that it is part of the United States... Talk about how Puerto Rico is a part of the US and that it is a commonwealth / territory, and if you're born there you are a US citizen... What language do people speak in Puerto Rico?\" Makes sofrito with aji dulce, culantro; same arroz con gandules  is the dominant cohort shape \u2014 `African` paired with U.S./Americas diaspora tags in Black History Month and Juneteenth lessons. The companion `Stewed Black Eyed Peas w/Plantains` summary names it explicitly: \"Also a traditional dish eaten throughout the Americas, it demonstrates the African Diaspora.\"\n- **`1xAXJC36uPVXF-yL1zmbCk6SqFJU_Ht5Kkg0Mc7NfwL8` \u2014 \"Wangari Maathai 4th/5th\"** (Cohort D under-tagged; tagged `[African]` only): Body \u2014 \"Today we're going to learn about a hero who helped her community and the Earth by planting trees... Introduce Wangari Maathai.\" The lesson is about Wangari Maathai, a Kenyan environmental activist, but only `African` is tagged \u2014 the sibling lesson `October Seed Saving` (also Wangari Maathai content per body: \"a real woman who lived in Kenya, a country in Africa. Her name is Wangari Maathai\") correctly tags `[Kenyan, African]`. Inconsistent depth on the same source material.\n\n**Tagging pattern:** Cohort A (3/41, ~7%) is genuinely pan-Africa \u2014 world-comparison and around-the-world-foods lessons where `African` carries the whole continent alongside other continents with no specific country to assign. Cohort B (9/41, ~22%) uses `African` as the redundant root of a Country \u2192 Sub-region \u2192 `African` ancestry chain (Nigerian/West African/African, Egyptian/North African/African, Kenyan/African, Ethiopian/African, Moroccan/North African/African, East African/African). Cohort C (25/41, ~61%) is the dominant pattern and the distinctive feature of this cluster: `African` paired with `African American` and/or `West African` and `Americas/North American` in Black History Month, Juneteenth, and African American foodways lessons \u2014 the tagging is intentionally diasporic-aware, locating dishes both at their West African origin and at their U.S. cultural home. Cohort D (4/41, ~10%) flags under-tagging: `Wangari Maathai 4th/5th` carries only `African` despite Kenyan body content; `Edmond Albius` carries `[African, African American diaspora]` without a sub-region tag (body identifies R\u00e9union / East Africa); the two `Lotion & Agar Soap` lessons (K + MS) carry `[African, North American]` \u2014 Dr. George Washington Carver content where the African American identity tag is the natural fit (sibling `In the Garden with Dr. Carver` carries it correctly). **Cross-cluster diaspora pairing rates** (active corpus, TEST DB query 2026-05-10): 15 of 24 `African American` lessons carry `African` as a parallel tag (62.5%); 3 of 24 carry `West African` (12.5%); 1 of 2 `African American diaspora` lessons carries `African`. Of the 12 `West African + African` lessons that do NOT also carry `African American`, 10 are diaspora-aware Cohort C carry-ins (2 Callaloo, 7 with `North American` parent \u2014 Juneteenth \u00d7 3, BHM \u00d7 2, Newly Freed Americans, BEP Hummus \u2014 and 1 Juneteenth that omits NA too); only 1 (Nigeria/Red Bean Stew) is pure West African + African with no cross-cluster tag. The diaspora connection is encoded in the West African + Americas/North American/Caribbean pairing even when the explicit `African American` tag is omitted.", "notes": "Cluster root for the African cluster (third-largest cluster root in the corpus at 41 lessons, after Americas 170 and Asian 63). Cohort C's 25 lessons (~61%) make this the most diaspora-heavy cluster root in the corpus \u2014 by contrast with Asian's \u00a711.1 (Cohort A pan-region 4 + Cohort B hierarchical-parent 59 dominate) and Americas's \u00a712.1 (Cohort A pan-Americas ~28 + Cohort B hierarchical-parent ~142). Neither of those cluster roots carries a comparable cluster-level diaspora cohort \u2014 for Americas, the sub-region \u00a712.2 North American is where the diaspora cohort lives (Cohort A African American/West African diaspora ~23, Cohort B Indigenous/Native American ~23, Cohort D USA-generic ~35), not the cluster root itself. Filter-UI tier `top` is the cluster-root default and well-supported by frequency. Stage 2 audit signals include: under-tagged Kenyan content (Wangari Maathai 4th/5th), under-tagged Carver content (2 soap lessons), under-tagged R\u00e9union / East African geography (Edmond Albius), and a Cohort A heritage-array anomaly (`5th Grade Food Cultures Unit Overview` carries `African` despite no African country in the body keywords \u2014 plausible legacy auto-tagging artifact; flag for Stage 2 reviewer validation). The cross-cluster diaspora interaction with \u00a79.1 is the heaviest in the corpus and would benefit from explicit Stage 2 attention to (a) whether `African American`-content lessons should carry both `African` AND `West African` (current corpus pattern: 15/24 carry `African`, 3/24 carry `West African`) and (b) whether the cluster-root convention for diaspora-bridged dishes is `African` or `West African` (a structural curriculum-team question).", "recommendation": null, "suggested_verdict": "keep", "easy_confirm": false, "advice": {"primary": "keep", "primary_text": "Keep this value as-is. The structural fields are already proposed \u2014 just confirm.", "alternative": null, "alternative_text": null}, "freq_plain": "41 lessons", "prompt": "Should \"African\" stay as a canonical value?"}, {"num": "13.2", "title": "West African (15)", "title_text": "West African", "freq": "15", "cluster": "\u00a713 African", "cluster_id": "13", "fields": {"canonical_key": {"value": "west-african", "cascade": "", "plain_cascade": "", "comments": [], "line": 1434}, "surface_label": {"value": "West African", "cascade": "", "plain_cascade": "", "comments": [], "line": 1435}, "parent": {"value": "african", "cascade": "", "plain_cascade": "", "comments": [], "line": 1436}, "filter_ui_tier": {"value": "sub", "cascade": "", "plain_cascade": "", "comments": [], "line": 1437}, "verdict": {"value": "<to_fill>", "cascade": "", "plain_cascade": "", "comments": [], "line": 1438}, "aliases": {"value": "[]", "cascade": "", "plain_cascade": "", "comments": [], "line": 1439}}, "has_corpus": true, "corpus_summary": "Corpus evidence (15 active lessons; 14 of 15 carry at least one cross-cluster tag \u2014 only Nigeria/Red Bean Stew is pure West African + African. Cross-cluster pairings overlap \u2014 1 lesson is both `African American` AND `North American`. Bucket counts: 3 with `African American`, 2 with `Caribbean`, 8 with `North American` (7 of those WITHOUT explicit `African American`; 1 of those also `Southern United States`), 2 with Americas-only cross-cluster (Juneteenth `1gHg6...` + Seed & Date Balls). 2 lessons additionally country-tag `Nigerian`.)", "corpus_body": "- **`1HWSlL8xio3QQkculHrVLA0EvEBSU4Th_tEZU4pXiD4Q` \u2014 \"Nigeria / Red Bean Stew\"** (Cohort A, country-tagged + pure-WA; tagged `[Nigerian, West African, African]`): \"Red Bean Stew/Nigeria (Foods around the World) Keywords: Nigeria, red bean stew. Summary: Students will learn about Nigeria and make red bean stew.\" Anchored to a single named country with no diaspora framing \u2014 students learn about Nigeria specifically, no slave-trade or African-American history context. The ONLY lesson in the cohort that is pure West African + African (no `North American`, `African American`, or `Caribbean` carry-along) \u2014 the cleanest country-anchored row.\n- **`10VASBkheY2wLqM6A81N6yLjwY0lMGbcFcQ7MElBYqEY` \u2014 \"A Short History of African American Farmers and Cooks\"** (Cohort A + Cohort C \u2014 country tag AND African American diaspora; tagged `[Nigerian, West African, African American, African, Americas]`): \"Students will read an introductory text about influence of African Americans on American farming and food traditions, moving from the era of slavery to the modern era. Then students will cook and eat Nigerian asaro, a recipe that combines African and American influences.\" Explicitly bridges Nigeria \u2192 African American culinary tradition by pairing a Black-history reading with a Nigerian dish. The five-tag chain is the corpus's most-articulated diaspora pattern \u2014 country + sub-region + region + diaspora-cluster + geographic-anchor.\n- **`1UnaUuap0s73WmekEM-m0amMyaww8T_bYS6JeNFgZmmY` \u2014 \"Callaloo\"** (Cohort C, Caribbean diaspora pairing; tagged `[Caribbean, Americas, West African, African]`): \"Today we will make a dish called Callaloo which comes from tropical Caribbean islands like Trinidad, Jamaica and Dominica. (Point to the countries on a world map). These are places that are warm for most of the year\u2026 We will look at how people eat different foods in different climates, and at how traditional dishes change when people move around the world.\" Body anchors entirely in Caribbean geography; the `West African + African` tag pair acknowledges the dish's diasporic origin without surfacing in the lesson text. Both Callaloo lessons in the cohort use this same `Caribbean + West African + African` tag chain (the corpus's headline cross-cluster pattern \u2014 also surfaced in the \u00a712.2 North American read).\n- **`1NHQd8BVmNECNgkMV4FeJjC5fzMxi-Pcp` \u2014 \"Stewed Black Eyed Peas w/Plantains\"** (Cohort C, African American diaspora pairing; tagged `[West African, African, African American, Americas]`): \"As a tribute to Black History month, students will learn how to make a black-eyed pea stew with fried plantains, a popular dish throughout western Africa. Also a traditional dish eaten throughout the Americas, it demonstrates the African Diaspora\u2026 This dish is traditionally eaten for luck during the New Year in the American South. It originates in Africa, particularly Western Africa and Ghana, where it was brought to the Americas through the slave trade.\" Body explicitly names \"the African Diaspora\" as the framing concept \u2014 the most pedagogically-explicit diaspora lesson in the cohort. Curiously omits the `North American` tag despite anchoring in the American South.\n- **`1DdaCvc-EWgpVEHQLfngJnMUrHO3TsRRRfdMRsG9XX0o` \u2014 \"Newly Freed Americans\"** (Cohort C, North American diaspora framing without explicit `African American` tag; tagged `[West African, African, North American, Americas]`): \"Most Black Americans who lived in the South after the Civil War trace their ancestry to West Africa. Yams were a very important crop to West African peoples.\" Lesson body is unambiguously about African American history (sharecropping, post-Civil-War sweet potato cultivation, Black culinary culture preservation) \u2014 yet carries no `African American` tag. This is the pattern across 7 of the 8 `North American`-paired lessons in the cohort: Juneteenth, Black History Month, and Civil War framings tag `West African + North American` but omit `African American` despite all-but-explicit content alignment.\n- **`149Rdf7CWlzT281PVn5cXzPekcyHA2ozj` \u2014 \"Seed & Date Balls\"** (Cohort D, over-tagged audit signal; tagged `[West African, African, Americas, Asian]`): The body's West African reference is one paragraph deep in a multi-civilizational survey: \"Seed balls may have been used by the Ancient Egyptians to seed the receding banks of The Nile after annual floods. They have been used in Asia and elsewhere, especially in arid regions\u2026 In the Carolinas in the 1700's, West African slaves, predominantly women, were brought in to cultivate rice using a seed ball technique that was used in Africa.\" Lesson's actual focus is springtime seed-ball gardening + a date-ball snack \u2014 neither the seed-ball technique nor the date-ball recipe is meaningfully West African. The `Asian` tag is similarly tenuous (one body sentence). This is the cohort's clearest over-tagging case.\n\n**Tagging pattern:** West African is unusually diaspora-heavy \u2014 **14 of 15 lessons (93%) carry at least one cross-cluster diaspora tag**, far above the East Asian (~26%) and South Asian comparisons (per \u00a711.2 and \u00a711.3). The diaspora pairings split into three buckets: **3 lessons (20%) carry the explicit `African American` tag** (Short History, BHM black-eyed peas, Stewed BEP w/Plantains); **2 lessons (13%) carry `Caribbean`** (both Callaloo lessons, mirroring the \u00a712.4 finding that Caribbean dishes intentionally surface West African diasporic origin); and **8 lessons (53%) carry `North American` as a diaspora-framing parent** \u2014 of those 8, 7 (47%) carry `North American` WITHOUT an explicit `African American` tag despite content that is unambiguously African American (Juneteenth lessons, BHM cornbread/Hoppin' John, Newly Freed Americans, Black-Eyed Pea Hummus); the 1 NA-with-explicit-AA case is the BHM black-eyed peas lesson which is fully five-tag-stacked. Only **1 lesson (7%)** \u2014 Nigeria / Red Bean Stew \u2014 is pure West African + African with no cross-cluster carry-along. **Country-tag adoption is sparse** \u2014 2 of 15 lessons (13%) carry `Nigerian`; the remaining 13 stop at `West African` even when bodies name specific countries (e.g., Stewed BEP w/Plantains explicitly cites \"Western Africa and Ghana\"; no `Ghanaian` tag). **The headline Stage 2 audit signal is the African American under-tagging pattern** \u2014 7-8 lessons read as African American-cluster content (Juneteenth, BHM, post-Civil-War sharecropping, Hoppin' John, Newly Freed Americans) but omit the `African American` diaspora-cluster tag the \u00a712.2 read showed should be present. The flip-side (Seed & Date Balls' over-tag of `West African` for one body sentence about Carolina rice cultivation) is a single, easily-corrected case.", "notes": "v3 canonical sub-region. Filter-UI tier `sub` proposed (15 lessons, comfortably above the \u22655 sub-tier bar; below the \u226540 `top` threshold). Curriculum team may promote to `top` given the cluster's curricular density and the 93% diaspora-pairing rate \u2014 `West African` carries an unusually high amount of pedagogical weight per the corpus pattern. Pre-handoff structural recommendation: keep parent = `african`. v3 baseline lists `Nigerian` (and `Ethiopian`) directly under `African` without a `West African` c9177095438787c8087cbf48f682` \u2014 \"Food Origins Scavenger Hunt\", tagged `[asian, americas, african, european]`, a multi-continent comparison lesson where all four cluster-root tags are kebab-case-lowercase \u2014 recognizable post-PR-update synthetic-`lesson_` ID). Same convention as \u00a711.16-18 and \u00a712.19-22. The `canonical_key` field matches the merge target's slug (both are kebab-case-lowercase by slug convention applied to the same underlying value \u2014 see \u00a77 alias_map identity-shaped entries; recall the \u00a77 parser invariant: `verdict in ('keep', 'new')` filter applies BEFORE keying canonical_key). This entry contributes `\"african\" \u2192 \"african\"` to the `alias_map` output (literal-to-canonical-key); verdict `merge` excludes it from the canonical vocabulary list.", "recommendation": null, "suggested_verdict": "merge", "easy_confirm": true, "advice": {"primary": "merge", "primary_text": "Merge it into \"african\". This is a non-canonical drift form \u2014 folding it into the canonical value cleans up the vocabulary.", "alternative": null, "alternative_text": null}, "freq_plain": "drift form (1 lesson)", "prompt": "Should this drift form fold into \"african\"?"}, {"num": "14.1", "title": "European (53)", "title_text": "European", "freq": "53", "cluster": "\u00a714 European", "cluster_id": "14", "fields": {"canonical_key": {"value": "european", "cascade": "", "plain_cascade": "", "comments": [], "line": 1605}, "surface_label": {"value": "European", "cascade": "", "plain_cascade": "", "comments": [], "line": 1606}, "parent": {"value": "null", "cascade": "", "plain_cascade": "", "comments": [], "line": 1607}, "filter_ui_tier": {"value": "top", "cascade": "", "plain_cascade": "", "comments": [], "line": 1608}, "verdict": {"value": "<to_fill>", "cascade": "", "plain_cascade": "", "comments": [], "line": 1609}, "aliases": {"value": "[]", "cascade": "", "plain_cascade": "", "comments": [], "line": 1610}}, "has_corpus": true, "corpus_summary": "Corpus evidence (53 active lessons; 3 genuinely pan-region multi-continent, 35 hierarchical-chain country/sub-region (22 Italian + 5 Mediterranean-only + 3 Ukrainian + 2 Spanish + 2 Irish + 1 Greek), 11 cross-cluster Americas carry-ins, 4 anomaly residuals)", "corpus_body": "- **`1IxkjYeOmhz2M_MC_Cbzj8vJMnLNVA5UX56CGi6E_Ap8` \u2014 \"Food Photovoice Lesson Four: What the World Eats\"** (Cohort A; tagged `[Asian, African, European, Americas]`): Body \u2014 \"This week, we are going to look at food and families around the world. We will look at photos that show us a family that lives somewhere in the world and what this family eats in an entire week...\" A four-continent comparison lesson with no sub-region/country children; `European` carries the entire continent alongside three other continent-level tags. Identical pan-region framing shape as the \u00a713.1 African and \u00a711.1 Asian Cohort A entries (which surface this same lesson).\n- **`1qFG6f3CdmVqjeTJ_Xfv_y2cITHd6beOeCycIZKV73mE` \u2014 \"Italy / Pesto\"** (Cohort B Italian; tagged `[Italian, Mediterranean, European]`): Body \u2014 \"Pesto was invented by Italians in the city of Genoa. Basil grew very well in their soil... People were eating pesto in the days of the Roman Empire... Italians never ate, grew or even saw tomatoes until after 1492. That's because tomatoes are from America, and no one in Europe had ever seen one until after Columbus first went there.\" A single-country lesson with the canonical three-level chain Italian \u2192 Mediterranean \u2192 European; `European` is the redundant root of the ancestry chain, not an independent signal. Direct companion shape to \u00a711.1's Indian \u2192 South Asian \u2192 Asian and \u00a713.1's Nigerian \u2192 West African \u2192 African. The Italian \u2192 Mediterranean \u2192 European chain dominates the cluster (22 of 53 lessons, 42%) \u2014 almost all are pesto / pizza / pasta / panzanella / tomato-sauce recipes carrying the identical three-tag stack.\n- **`1i-jRBvEt7y6JAIeoiGDsX7J75sok1BV4BXZbD-vYlp4` \u2014 \"Borscht\"** (Cohort B Ukrainian/Russian; tagged `[Ukrainian, Russian, Eastern European, European]`): Body \u2014 \"Explain that today we are making a soup that comes from Eastern Europe, countries like Russia and Ukraine. 'This pink soup is made with winter vegetables and is a great way to stay warm in the cold winter months!'... Solicit answers from students, many Russian/Ukrainian students will be excited to share!\" The corpus's only `Ukrainian + Russian` dual-country lesson \u2014 a four-tag stack that names two specific countries plus the sub-region plus the cluster root, in body content that genuinely treats the dish as cross-country Eastern European. The clean three-level chain pattern carries through `Foods From Around the World: Ukraine` and `Varenyky` (both `[Ukrainian, Eastern European, European]`) but no other corpus lesson dual-codes Russian alongside.\n- **`1OLfezTbT0voh-Km85VIkJiuOmhju7CiF9kGSKb8JnXs` \u2014 \"Garlic Bread and Planting\"** (Cohort B Mediterranean-only; tagged `[Mediterranean, European]`): Body content is fully horticultural \u2014 \"Discuss Fall: What season are we in? What happens in the fall?... Using a visual aid of bulbs, show that bulbs are similar to seeds because they have a coat or skin on the outside to protect them... Garlic has also been used as medicine for thousands of years. It's antibacterial and can treat infections... Pull up the stick for the spot you want to plant / Make a hole about the depth of your pointer finger.\" No country anchor, no cultural framing \u2014 `Mediterranean + European` is functioning as a culinary-ingredient tag for garlic/olive-oil/bread foods rather than a geographic anchor. The 5 Mediterranean-only Cohort B lessons (Chickpea & Spinach Salad, Garlic Bread, Harvest & Baking Breadsticks, Rainbow Pizza, Welcome Back Chickpea Pizza) all share this shape: olive-oil + bread/vegetable/chickpea recipes that read as Italian-leaning in spirit but stop at the sub-region tag.\n- **`16mykieJMT9T8b1iKHErAUFRhC-Sou_FckP-CzyJIOG4` \u2014 \"BCCS Empanadas\"** (Cohort C; tagged `[Latin American, Spanish, Mediterranean, Americas, European]`): Body \u2014 \"Today we are going to be practicing working together while making a vegetarian empanada. Empanadas are a popular food in Latin America but have origins in Spain, there are many different ingredients that can be used for empanada filling.\" The five-tag stack threads the diaspora deliberately: `Latin American + Americas` is the dish's current cultural home (where empanadas are eaten today) and `Spanish + Mediterranean + European` is the dish's stated origin (where the food technique came from). The sibling lesson `Empanadas` (`1mAI2VtQntfWhUtIEKT1xP6Q028Hx-Jyqx_Xr-V2vWkI`) carries the identical five-tag stack with the identical \"Latin America but have origins in Spain\" body framing \u2014 the corpus's clearest pedagogically-explicit European-diaspora tagging. The same pattern surfaces in `Apple Pie` (`[North American, European]` with body reading \"Take your shopping list and some walking shoes. Then catch a steamship bound for Europe... Find a farm deep in the countryside. Gather some superb semolina wheat... Then hop a train to France and locate a chicken\") and in `September Salsa Toasts` (`[Mexican, Latin American, Americas, Italian, European]` \u2014 body cross-references Spanish salsa + Italian crostini etymology in the vocabulary block).\n- **`1QLiWw08Qi5CSB6uMwwm27WDgMNG-LMhtqOu6z85VRkk` \u2014 \"Food Preservation\"** (Cohort D over-tag; tagged `[Japanese, Indian, Mediterranean, European, Asian]`): Body samples three civilizations' preservation methods in three paragraphs \u2014 \"Sushi is a dish from Japan that uses a type of seaweed as a wrapper... cucumbers were originally made into pickles in India over 4,000 years ago... Ancient people in Greece and Rome used honey to make jelly with fruit.\" The five-tag stack faithfully captures the three-civilization survey, but the lesson is primarily a Japan/India-anchored read with one Greece/Rome sentence. `European + Mediterranean` is structurally legitimate (Greece + Rome \u2192 Mediterranean \u2192 European) but light on body evidence vs. the Asian sub-tags. Closest cohort analog is the \u00a713.2 West African `Seed & Date Balls` over-tag where one sentence of body content drives a parallel tag chain. **`1_rHQ9aGoFQkgrM1ebgtqo5o6ZjJqXAoA` \u2014 \"Green Room Party\"** is the contrasting Cohort D anomaly (tagged `[European]` only): body content is three-cheese mashed potatoes prepared as the winning entry from a class math assignment about scaling recipes \u2014 no European country, no Eastern/Mediterranean sub-region, no culinary-tradition framing. Under-tagged with no clear right answer (mashed potatoes are pan-European at best; the cultural framing is \"winning student math project,\" not Europe).\n\n**Tagging pattern:** Cohort A (3/53, ~6%) is genuinely pan-Europe \u2014 world-comparison and around-the-world-foods unit lessons where `European` carries the whole continent alongside other continent-level tags with no specific country or sub-region to assign. This rate sits in the same low band as \u00a713.1 African (3/41 ~7%) and \u00a711.1 Asian (4/63 ~6%); \u00a712.1 Americas is the outlier at ~28/170 ~16%. European's distinctive shape lives not in Cohort A but in its Cohort B/C distribution \u2014 the corpus's \"foods around the world\" lessons disproportionately reach for specific European countries (Ukraine, Italy, Spain, Ireland, Greece) rather than the cluster root, and the cluster's defining feature is heavy Italian-skewed hierarchical-parent ancestry (Cohort B 66%) plus cross-cluster Americas carry-in (Cohort C 21%), in contrast to \u00a713.1 African where Cohort C diaspora-aware pairings dominate the cluster root at 61%. Cohort B (35/53, ~66%) uses `European` as the redundant root of a Country \u2192 Sub-region \u2192 `European` ancestry chain \u2014 the breakdown is **Italian \u2192 Mediterranean \u2192 European (22 lessons, 42% of cluster root)**, **Mediterranean \u2192 European only (5 lessons, 9%)**, **Ukrainian \u2192 Eastern European \u2192 European (3 lessons, 6%)**, **Spanish \u2192 Mediterranean \u2192 European (2 lessons, 4%)**, **Irish \u2192 European, no sub-region intermediate (2 lessons, 4%)**, **Greek \u2192 Mediterranean \u2192 European (1 lesson, 2%)**. The Italian-heavy skew is the cluster's defining feature: pesto / pizza / pasta / panzanella / tomato sauce / sourdough recipes account for ~40% of all European-tagged lessons. Mediterranean is the dominant sub-region pivot \u2014 31 of the 35 Cohort B lessons (89%) carry `Mediterranean` as the intermediate, vs. only 3 with `Eastern European` and 2 (Ireland/Colcannon, Potato Leek Soup) with no sub-region intermediate at all. **`Irish` chains directly to `European` skipping any sub-region** \u2014 there is no `Western European` or `Northern European` canonical in the corpus, which means Irish-tagged lessons either get a two-level chain (Irish \u2192 European) while all other country-tagged Europeans get three levels (Country \u2192 Mediterranean/Eastern European \u2192 European), or `Irish` would need a sub-region parent introduced in canonicalization. Cohort C (11/53, ~21%) is the cross-cluster Americas carry-in: `European` paired with `Americas / Latin American / Mexican / North American` in lessons where the dish's European-origin and Americas-current-home are both tagged. The dominant shapes are **Empanada lessons (3) carrying the five-tag `[Latin American, Spanish, Mediterranean, Americas, European]` stack with explicit \"origins in Spain, popular in Latin America\" body framing**; **Apple Pie / Colonial Foods of New York (2) carrying `[North American, European]` framing the U.S. as a destination for European immigrant cuisine**; **Following a Recipe + Kitchen Cognates (2) carrying `[European, Latin American, Americas]` despite body content that is actually bilingual-cognate or hot-chocolate-recipe with no European origin claim \u2014 likely Stage 2 over-tag candidates**; and **Food Geography - Pizza + Food Processing Through History + September Salsa Toasts + Sandwich Swap (4) carrying mixed combinations of `Italian/Spanish/Mexican/Latin American/North American/European` for fusion or world-foods comparative lessons**. Cohort C's diaspora-aware pattern parallels \u00a713.1 African Cohort C (61% of African-tagged lessons carry African American or Caribbean cross-tags) \u2014 the European-Americas pairing exists at lower density (~21%) because European-origin dishes in NYC food culture aren't pedagogically framed as \"diaspora\" the way West African / African American dishes are; they're framed as \"origins in\" Spain or Italy or Ireland. Cohort D (4/53, ~8%) flags audit signals: **Green Room Party** (under-tagged, only `European`, body is a class-math-project mashed-potato recipe with no continental anchor \u2014 flag for Stage 2 reviewer judgment of whether to keep `European`, demote to `internal`, or drop entirely); **Cellular Respiration + Microbiome** (over-tagged science lessons \u2014 body content is yeast-cell-respiration experiments and gut-microbiome biology; the European/Mediterranean tag rides on the recipe vehicle being garlic bread or tzatziki rather than on cultural-heritage content. The \u00a713.1-style audit framing applies: cultural-heritage tags on science lessons where the recipe is incidental are plausible legacy auto-tagging artifacts); **Food Preservation** (over-tagged \u2014 body samples Japan + India + Greece/Rome but the `European + Mediterranean` tag stands on a single sentence about ancient Greek/Roman honey-jelly, parallel to \u00a713.2 Seed & Date Balls). **5th Grade Food Cultures Unit Overview** (Cohort A) inherits the \u00a713.1 audit flag: its tag stack includes `African` despite no African country in the body keywords (Ukraine, Uzbekistan, Pakistan, China, Mexico, Caribbean Islands, NYC) \u2014 `European` is the only one of the four continent-level tags substantiated by the body (Ukraine), so the Cohort A placement is defensible but the four-continent tag set is corpus-wide a legacy auto-tagging artifact. **Stage 2 audit signals to surface:** (a) Irish-tagged lessons skip the sub-region level entirely \u2014 does canonicalization require introducing `Northern European` or `Western European` to give Irish a parent? (b) Mediterranean-only Cohort B lessons (5) are pan-Mediterranean-ingredient lessons rather than country-anchored \u2014 keep the `Mediterranean` tag, drop to `European` only, or relabel as something like \"Italian-influenced\" if reviewer confirms? (c) Following a Recipe + Kitchen Cognates Cohort C cases over-tag `European` for a hot-chocolate recipe and a Spanish-cognate matching game (no European origin claim in either body) \u2014 review for tag-drop. (d) Cellular Respiration + Microbiome science-lesson over-tags parallel the \u00a713.1 audit framing on `5th Grade Food Cultures` \u2014 review for Mediterranean+European tag-drop given the cultural-heritage signal rides entirely on the recipe vehicle. (e) Green Room Party single-tag `European` is the corpus's only `European`-without-sub-region row \u2014 under-tag flag.", "notes": "Cluster root for the European cluster (fourth-largest cluster root in the corpus at 53 lessons, after Americas 170, Asian 63, and African 41). Cohort B's 35 lessons (~66%) make this the most hierarchical-chain-heavy cluster root in the corpus \u2014 by contrast with \u00a713.1 African (Cohort C diaspora-heavy at ~61%) and \u00a712.1 Americas (mixed pan-Americas + hierarchical-parent + sub-region cohorts). Cohort C's 11 lessons (~21%) is the cluster's cross-cluster signal \u2014 `European` paired with `Americas / Latin American / Mexican / North American` for European-origin dishes finding their U.S. cultural home (Apple Pie, Colonial Foods of New York, empanada lessons) \u2014 at lower density than \u00a713.1 African Cohort C because European-origin dishes in NYC food culture aren't pedagogically framed as \"diaspora\" the way West African / African American dishes are. Filter-UI tier `top` is the cluster-root default and well-supported by frequency (53 lessons, comfortably above the \u226540 top-tier threshold). Stage 2 audit signals captured to register entries EUR-01 through EUR-14: Green Room Party single-`European` under-tag (EUR-01); science-lesson Mediterranean+European over-tags (Cellular Respiration + Microbiome, EUR-02); Cohort C over-tags without body-content European-origin (Following a Recipe + Kitchen Cognates, EUR-03); the open structural question of whether Irish should acquire a `Northern European` / `Western European` sub-region parent (EUR-14); the `5th Grade Food Cultures Unit Overview` heritage-array anomaly already tracked under AFR-07.", "recommendation": null, "suggested_verdict": "keep", "easy_confirm": false, "advice": {"primary": "keep", "primary_text": "Keep this value as-is. The structural fields are already proposed \u2014 just confirm.", "alternative": null, "alternative_text": null}, "freq_plain": "53 lessons", "prompt": "Should \"European\" stay as a canonical value?"}, {"num": "14.2", "title": "Mediterranean (39)", "title_text": "Mediterranean", "freq": "39", "cluster": "\u00a714 European", "cluster_id": "14", "fields": {"canonical_key": {"value": "mediterranean", "cascade": "", "plain_cascade": "", "comments": [], "line": 1631}, "surface_label": {"value": "Mediterranean", "cascade": "", "plain_cascade": "", "comments": [], "line": 1632}, "parent": {"value": "european", "cascade": "", "plain_cascade": "", "comments": [], "line": 1633}, "filter_ui_tier": {"value": "top", "cascade": "", "plain_cascade": "", "comments": [], "line": 1634}, "verdict": {"value": "<to_fill>", "cascade": "", "plain_cascade": "", "comments": [], "line": 1635}, "aliases": {"value": "[]", "cascade": "", "plain_cascade": "", "comments": [], "line": 1636}}, "has_corpus": true, "corpus_summary": "Corpus evidence (39 active lessons; 37 of 39 carry `European` as a parent \u2014 95%; the 2 exceptions are `Street Vendors/Chicken Over Rice` and `Tastes Around the World`. Cohort breakdown: 23 Italian-anchored (B-Italian, 59%); 4 Spanish-anchored (B-Spanish, 10% \u2014 2 actual Spain-cuisine + 2 Spanish-language-curriculum carry-ins to Latin American empanadas); 2 Greek (B-Greek, 5% \u2014 Tzatziki + Where Does Pizza Come From which is dual-tagged Italian + Greek); 8 pan-Mediterranean with no country (B-pan-Med, 21%); 4 cross-cluster anomalies where `Mediterranean` rides alongside non-European cluster tags (Food Preservation, Street Vendors, Tastes Around the World, Sandwich Swap \u2014 the last is also counted in B-pan-Med since it pairs hummus/pita with sunbutter/jelly across cluster lines without naming a country). Sum 23 + 4 + 2 + 8 + 4 = 41 reconciles to 39 via 2 acknowledged overlaps: Where Does Pizza Come From in both B-Italian and B-Greek; Sandwich Swap in both B-pan-Med and cross-cluster.)", "corpus_body": "- **`1qFG6f3CdmVqjeTJ_Xfv_y2cITHd6beOeCycIZKV73mE` \u2014 \"Italy / Pesto\"** (Cohort B-Italian, country-anchored; tagged `[Italian, Mediterranean, European]`): \"Italy/Pesto (Foods around the World) Keywords: italy, pesto, sofrito\u2026 Pesto was invented by Italians in the city of Genoa. Basil grew very well in their soil, and they needed to figure out a way to eat it\u2026 Italians never ate, grew or even saw tomatoes until after 1492. That's because tomatoes are from America, and no one in Europe had ever seen one until after Columbus first went there.\" The cleanest example of the cohort's dominant tagging shape \u2014 country (Italian) \u2192 sub-region (Mediterranean) \u2192 cluster root (European), with `Mediterranean` operating purely as a redundant geographic-ancestry chain link, the way `East Asian` does for `Chinese` in \u00a711.2 / \u00a711.6. The body never invokes the Mediterranean as a region \u2014 it speaks of Italy, of Genoa, and of pre-Columbian Europe. `Mediterranean` is curatorial scaffolding, not pedagogical signal. The 22 other Italian-anchored lessons in the cohort (Pesto Pizza, Pasta, Panzanella, Tomato Sauce with Summer Vegetables, Sourdough & Fungi K + MS, Following Instructions [pizza], Friendship Pizza, Plant Part Pizza, Plant Part Pasta, Whole Wheat Pizza, Vegetable Whole Wheat Pasta, Primavera Pasta, Kale Pesto, Pea Shoot Pesto, Pesto Celebration, Peach Sorbet, King of Pizza, Alternative Proteins [Italian sausage], Food Geography-Pizza, Food Traditions and Pesto Pasta) all use the same three-tag chain with identical pizza-pasta-pesto curricular content. **Italian-anchored content is 23 of 39 lessons (59%)** \u2014 the Mediterranean tag is, in practice, the corpus's umbrella label for Italian cuisine.\n- **`0B5ixnZghJTD6QWZIRUo1cWZ1NWs` \u2014 \"Where Does Pizza Come From?\"** (Cohort B-Italian + B-Greek, dual-country-anchored; tagged `[Italian, Mediterranean, European, Greek]`): \"We think of lasagna as an Italian food, but lasagna may have a connection to ancient Greece. The ancient Greeks had a flat, thin bread, which they called lagana\u2026 The Italians learned about lagana, which may have inspired them to create a flat, thin noodle that we call lasagna\u2026 Just like lasagna, you may find that pizza has connections to several places around the world.\" The single lesson in the cohort where `Mediterranean` actually does work \u2014 the body's pedagogical move is the Greek-to-Italian transmission of a flatbread tradition, and the sub-region tag captures the cross-country regional throughline that neither `Italian` nor `Greek` alone would. The sibling lesson `Tzatziki (Mobile Education)` (tagged `[Greek, Mediterranean, European]`) is the only other Greek-anchored row and frames `tzatziki` cross-regionally \u2014 \"This sauce is very popular in Greece as well as other countries in the Middle East. Many cultures around the world have similar yogurt sauces/dips, like Raita in India, Labneh in the Middle East, and Caesar/Ranch dressing in America.\" Cohort B-Greek is 2/39 (5%); both lessons explicitly draw cross-country regional connections in their bodies.\n- **`1N7gRmGohK_fCtpiHemQTl1-Bpg-hwOF9` \u2014 \"Tortilla Espa\u00f1ola\"** (Cohort B-Spanish, Spain-cuisine; tagged `[Spanish, Mediterranean, European]`): \"Tortilla Espa\u00f1ola. Students will get a chance to cook with eggs by making tortilla espanola\u2026 Students will use eggs from chickens in our garden, and will learn more about our chickens and the eggs that they produce.\" Genuine Spain-the-country cuisine \u2014 Spanish potato-and-egg tortilla, not Latin American tortilla flatbread. The duplicate row `1JEpJpbINYmbIN9j5W2dYrgIW6e0EqpalMa3kqm_53cI` (\"Tortilla Espanola\") carries the same three-tag chain. **Cohort B-Spanish splits 2 + 2:** 2 Spain-cuisine rows (the two Tortilla Espa\u00f1ola lessons) and 2 Latin American empanada lessons that ride into the Mediterranean cluster on the Spanish-language-curriculum / Spanish-colonial-origin signal \u2014 `1mAI2VtQntfWhUtIEKT1xP6Q028Hx-Jyqx_Xr-V2vWkI` (\"Empanadas\") and `16mykieJMT9T8b1iKHErAUFRhC-Sou_FckP-CzyJIOG4` (\"BCCS Empanadas\"), both tagged `[Latin American, Spanish, Mediterranean, Americas, European]` with body text \"Empanadas are a popular food in Latin America but have origins in Spain.\" The empanada rows are the cohort's clearest case of `Spanish` operating as both a heritage-cluster country tag AND a Latin American multi-parent bridge \u2014 the `Mediterranean` tag rides along because of the `Spanish` country tag, not because the dish is Mediterranean cuisine.\n- **`1dkvE8YLHr-ZOiBGrTGPl1jk4CbP5G67K` \u2014 \"Chickpea & Spinach Garden Salad\"** (Cohort B-pan-Med, no country; tagged `[Mediterranean, European]`): \"Students will harvest spinach from the garden and make a chickpea spinach salad\u2026 Students will be able to experience a harvest-to-table recipe and the benefits of eating beans\u2026 Make dressing: Measure \u00bd tbsp lemon juice, mix with honey, olive oil, raisins, and spices.\" No country mentioned; the lesson tags `Mediterranean` on the strength of the ingredient signature (chickpeas + spinach + olive oil + lemon + honey + raisins \u2014 a generic Mediterranean-diet flavor profile). This shape repeats across the 8-lesson B-pan-Med cohort: `Garlic Bread and Planting` (garlic + bread, no country), `Harvest & Baking Lesson: Breadsticks` (rosemary + parmesan + bread, no country), `Welcome Back Chickpea Pizza` (chickpea-flour crust), `Rainbow Pizza` (vegetable pizza), `Microbiome` (yogurt + tzatziki \u2014 same recipe as the Greek-tagged Tzatziki but stripped of country tag), `Cellular Respiration` (yeast + garlic bread \u2014 science lesson where the bread is the experiment subject), and `Sandwich Swap` (hummus + pita as one option alongside sun butter + jelly). **The pan-Mediterranean cohort tags `Mediterranean` on ingredient-and-dish signature rather than on body content** \u2014 the lessons rarely or never invoke \"the Mediterranean\" as a place or culture. This is the cohort that makes `Mediterranean` distinctive from `Italian` \u2014 without it, all 8 of these lessons would have to either acquire a spurious country tag or drop their cluster signal entirely.\n- **`1T1sgLmsWzEYkAXNvsX4NMitYf0Au9o0Y8QZEsXpcPSo` \u2014 \"Street Vendors / Chicken Over Rice\"** (Cohort C, cross-cluster anomaly; tagged `[Middle Eastern, Mediterranean, Americas]` \u2014 **no `European`**): \"Students will learn about the history of mobile street vending, create a model food truck business, and prepare an ESYNYC take on NYC's classic halal cart 'chicken over rice'\u2026 cooking a halal-style dish\u2026 students can harvest/use parsley, garlic, and mushrooms.\" One of only **2 lessons in the cohort that omits the `European` parent** \u2014 the lesson treats the Mediterranean as a Middle-Eastern-adjacent geographic-cuisine signal (halal cart food, parsley/garlic/mushroom flavor base), not as a European sub-region. The sibling Cohort C anomaly `Tastes Around the World` (tagged `[Asian, Latin American, Mediterranean]` \u2014 also no `European`) uses Mediterranean as one term in a three-continent comparison; the body's gallery walk includes Dominican tostones, Japanese green tea, Ecuadorian pickled onions, Indian chai, Colombian arepas, and Ethiopian dates \u2014 no Mediterranean station appears in the body sample, so `Mediterranean` here looks like an auto-tag artifact rather than content-aligned signal. The other 2 cross-cluster carry-ins (`Food Preservation` tagged `[Japanese, Indian, Mediterranean, European, Asian]` \u2014 Mediterranean rides along on a pickled-cucumber + dried-seaweed multi-civilizational food-preservation survey; `Sandwich Swap` tagged `[Mediterranean, European, Americas]` \u2014 hummus-pita + sun-butter-jelly as parallel \"many cultures have sandwiches\" options) DO carry `European` and read as legitimate cohort tags via the hummus / pita / olive-oil ingredient signature.\n\n**Tagging pattern:** Mediterranean is the corpus's third-most-populous sub-region (39 active lessons) and shows the **tightest cluster-root coupling rate in the worksheet so far**: 37 of 39 lessons (95%) carry `European` as a parent, well above any cross-cluster diaspora pairing in the African (\u00a713.2) or Asian (\u00a711.2) reads. The 2 European-omitted lessons (Street Vendors, Tastes Around the World) are both Cohort C anomalies where `Mediterranean` is the sole connection to the European cluster \u2014 both warrant Stage 2 reviewer attention since the omission may be either intentional (Middle-Eastern-adjacent framing for Street Vendors; gallery-walk auto-tagging for Tastes Around the World) or an error. **Italian dominance is the headline cohort signal: 23 of 39 lessons (59%) carry `Italian`** \u2014 pizza, pasta, pesto, panzanella, and sourdough collectively are 23/23 of the Italian-anchored content, and the `Mediterranean` tag functions as redundant ancestry-chain scaffolding (Italian \u2192 Mediterranean \u2192 European) the same way `East Asian` functions for Chinese-anchored content in \u00a711.6. Cohort B-Spanish (4/39, 10%) splits structurally: 2 Spain-cuisine lessons (the two Tortilla Espa\u00f1ola rows) anchor cleanly; the other 2 are Latin American empanada lessons (BCCS Empanadas + Empanadas) that ride into the Mediterranean cluster on the Spanish-language-curriculum / Spanish-colonial-origin signal, carrying the multi-parent five-tag stack `[Latin American, Spanish, Mediterranean, Americas, European]`. These 2 empanada rows are the corpus's clearest case of `Spanish` operating as a heritage-cluster bridge between \u00a712 Americas (where Latin American sits) and \u00a714 European (where Spanish sits) \u2014 a structural parallel to the \u00a713.2 West African / African American diaspora bridge pattern, though in the empanadas case the bridge is colonial-linguistic rather than diasporic. Cohort B-Greek (2/39, 5%) is small but pedagogically substantive \u2014 both Greek-tagged lessons (Tzatziki, Where Does Pizza Come From) explicitly invoke cross-country Mediterranean transmission in their body text, making Greek the cohort where `Mediterranean` does the most semantic work per row. **Cohort B-pan-Med (8/39, 21%) is the distinctive feature of this sub-region** \u2014 the bucket of country-less lessons where `Mediterranean` tags on ingredient-and-dish signature (chickpea, olive oil, garlic, parmesan, yogurt, hummus, pita, sourdough) rather than on body-text geography. Without this cohort, `Mediterranean` would be almost entirely redundant with `Italian` + `Spanish` + `Greek`; with it, the sub-region earns independent semantic weight as the home for ingredient-coded Mediterranean-diet content that doesn't name a country. **Stage 2 audit signals:** (a) the 2 European-omitted Cohort C lessons (Street Vendors, Tastes Around the World) \u2014 verify whether `European` should be backfilled or whether the omission is intentional; (b) Cohort C carry-ins \u2014 `Food Preservation` (Mediterranean tags on one pickle-paragraph aside about cucumbers from India + a sushi-from-Japan note) and `Tastes Around the World` (no Mediterranean station appears in the gallery-walk body) are over-tag candidates parallel to the \u00a713.2 Seed & Date Balls / `West African` over-tag case; (c) the duplicate Tortilla Espa\u00f1ola rows (`1JEpJpbINYmbIN9j5W2dYrgIW6e0EqpalMa3kqm_53cI` + `1N7gRmGohK_fCtpiHemQTl1-Bpg-hwOF9`) are near-identical content with identical tagging \u2014 potential dedup pair; (d) Microbiome and Tzatziki are the same recipe (tzatziki dip) but Microbiome strips the `Greek` country tag while Tzatziki retains it \u2014 under-tagging signal worth Stage 2 reconciliation.", "notes": "v3 canonical sub-region. **Filter-UI tier `top` proposed** \u2014 at 39 lessons, just below the \u226540 lessons-for-top threshold, but the cluster framing block decision #2 surfaces the question explicitly: Mediterranean (39) is functionally heavier than the cluster root (53) once Italian-anchored content (23) is factored in. Tier promotion to `top` aligns with curricular usage and gives the Italian-pizza-pasta-pesto curriculum a prominent filter chip; curriculum-team-likely call. Pre-handoff structural recommendation: keep parent = `european` (v3 alignment + 95% European-pairing rate; only 2 of 39 omit). The 8-lesson pan-Mediterranean cohort (no country tag) is the sub-region's distinctive feature \u2014 chickpea / olive-oil / garlic / yogurt / hummus / pita / sourdough recipes that need `Mediterranean` to carry their cultural-heritage signal without invoking a specific country. Stage 2 audit signals captured to register entries EUR-04 (Microbiome strips `Greek`), EUR-05 (Tortilla Espa\u00f1ola dedup pair), EUR-08 (Cohort C Mediterranean carry-along over-tags \u2014 Food Preservation, Street Vendors, Tastes Around the World, Sandwich Swap).", "recommend  1657}, "parent": {"value": "european", "cascade": "", "plain_cascade": "", "comments": [], "line": 1658}, "filter_ui_tier": {"value": "sub", "cascade": "", "plain_cascade": "", "comments": [], "line": 1659}, "verdict": {"value": "<to_fill>", "cascade": "", "plain_cascade": "", "comments": [], "line": 1660}, "aliases": {"value": "[]", "cascade": "", "plain_cascade": "", "comments": [], "line": 1661}}, "has_corpus": false, "corpus_summary": "", "corpus_body": "", "notes": "v3 canonical sub-region. 3 corpus lessons all carry the full `[Eastern European, European]` parent chain plus a country tag: `Borscht` (`1i-jRBvEt7y6JAIeoiGDsX7J75sok1BV4BXZbD-vYlp4`) tags `[Ukrainian, Russian, Eastern European, European]` \u2014 dual-country Eastern Europe pan-region lesson (body: \"today we are making a soup that comes from Eastern Europe, countries like Russia and Ukraine\u2026 many Russian/Ukrainian students will be excited to share!\"); `Foods From Around the World: Ukraine` (`1-AYK5D4_VEmu2ZWgFtaJItK_rn3hhoEK8YdPr_F0Ows`) tags `[Ukrainian, Eastern European, European]` \u2014 country-anchored Ukraine lesson with Ukrainian American NYC community framing; `Varenyky` (`1kk7iWzUOFQY786Ilr2MqaEiCmfv1EpUm`) tags `[Ukrainian, Eastern European, European]` \u2014 Ukrainian dumpling lesson. **Empirical signal: 3/3 Eastern European lessons carry `European`** (100% pairing rate) and 3/3 also carry `Ukrainian`; `Russian` appears only in the Borscht dual-tag. The canonical 3-level chain Ukrainian \u2192 Eastern European \u2192 European is consistently applied across all 3 rows. Filter-UI tier `sub` proposed (3 lessons is at the threshold per \u00a76 conventions); curriculum team may consider `internal` given the low corpus frequency, but the sub-region serves a clear structural purpose as the canonical home for Ukrainian / Russian and (if `keep`) Polish (v3-corpus-absent \u2014 see \u00a714.11). Stage 2 follow-on: if Polish receives a `keep` verdict, Eastern European sub-region acquires str

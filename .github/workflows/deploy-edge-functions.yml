name: Deploy Edge Functions

on:
  pull_request:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'
  # Manual dispatch is intentionally allowed to target `production` directly
  # (e.g. emergency single-function redeploy). The `production` GitHub
  # Environment still requires manual approval, but the TEST step does NOT
  # run first when dispatching to production.
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (production deploys skip TEST — manual approval still applies)'
        type: choice
        options: [test, production]
        default: test
        required: true
      function:
        description: "Function name, or 'all' to deploy every function"
        type: string
        default: all
        required: true

concurrency:
  group: deploy-edge-functions-${{ github.event_name == 'push' && 'production' || github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('dispatch-{0}', inputs.environment) }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect Deploy Target
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.plan.outputs.target }}
      functions: ${{ steps.plan.outputs.functions }}
      has_work: ${{ steps.plan.outputs.has_work }}
      # "strict" => the post-deploy version-advance check fails the job on a
      # no-op. True only for automated push/PR deploys of specific changed
      # functions (their own source changed, so the version MUST advance).
      # False for manual dispatch and _shared fanouts, where redeploying
      # identical content is expected (the check warns instead).
      strict: ${{ steps.plan.outputs.strict }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Full history needed so the PR three-dot diff
          # (origin/<base>...HEAD) can resolve its merge base on PRs
          # with more than two commits since branching.
          fetch-depth: 0

      - name: Plan deployment
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_ENV: ${{ inputs.environment }}
          DISPATCH_FUNC: ${{ inputs.function }}
          BASE_REF: ${{ github.base_ref }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail

          # Initialize FUNCS up-front so the post-case length check is safe
          # regardless of which event branch ran (defensive under set -u).
          FUNCS=()

          # Strict no-op gate defaults OFF; only the "specific function dirs
          # changed on push/PR" branch below turns it on (see the `strict`
          # output comment). Manual dispatch, _shared fanouts, and the
          # orphan-history full-suite recovery all stay lenient.
          STRICT=false

          # Discover deployable functions from the filesystem so adding a new
          # function under supabase/functions/<name>/ doesn't require editing
          # this workflow. The `_*` filter excludes `_shared` and any future
          # underscore-prefixed support directories.
          mapfile -t ALL_FUNCTIONS < <(
            find supabase/functions -mindepth 1 -maxdepth 1 -type d \
              -not -name '_*' -printf '%f\n' | sort
          )

          if [ "${#ALL_FUNCTIONS[@]}" -eq 0 ]; then
            echo "::error::No edge functions discovered under supabase/functions/"
            exit 1
          fi
          echo "Discovered functions: ${ALL_FUNCTIONS[*]}"

          is_valid_function() {
            local name="$1"
            for f in "${ALL_FUNCTIONS[@]}"; do
              [ "$f" = "$name" ] && return 0
            done
            return 1
          }

          case "$EVENT_NAME" in
            workflow_dispatch)
              TARGET="$DISPATCH_ENV"
              if [ "$DISPATCH_FUNC" = "all" ]; then
                FUNCS=("${ALL_FUNCTIONS[@]}")
              else
                if ! is_valid_function "$DISPATCH_FUNC"; then
                  echo "::error::Unknown function name: $DISPATCH_FUNC"
                  echo "Valid: ${ALL_FUNCTIONS[*]}"
                  exit 1
                fi
                FUNCS=("$DISPATCH_FUNC")
              fi
              ;;
            pull_request)
              TARGET="test"
              # Unshallow fetch of base so the three-dot merge base resolves
              # even if main has advanced since the PR branched.
              git fetch origin "$BASE_REF"
              CHANGED=$(git diff --name-only "origin/$BASE_REF...HEAD" -- supabase/functions/ || true)
              ;;
            push)
              TARGET="production"
              # github.event.before is the SHA before the push, so it covers
              # the entire batch when multiple commits land at once. HEAD~1
              # would only see the last commit's diff and miss earlier ones.
              if [[ "$PUSH_BEFORE" =~ ^0+$ ]]; then
                # Initial push or force-push that orphans history; history is
                # unrecoverable, so deploy everything as the safe recovery.
                echo "::warning::Push has no usable 'before' SHA (initial or force-push); deploying all functions."
                FUNCS=("${ALL_FUNCTIONS[@]}")
              else
                CHANGED=$(git diff --name-only "$PUSH_BEFORE" HEAD -- supabase/functions/ || true)
              fi
              ;;
            *)
              echo "::error::Unsupported event: $EVENT_NAME"
              exit 1
              ;;
          esac

          # Process CHANGED only when a branch above set it. Skip when FUNCS
          # is already populated (workflow_dispatch, or the orphan-history
          # full-suite recovery in the push branch).
          if [ "${#FUNCS[@]}" -eq 0 ]; then
            if echo "${CHANGED:-}" | grep -q '^supabase/functions/_shared/'; then
              echo "Shared code changed — deploying all functions."
              FUNCS=("${ALL_FUNCTIONS[@]}")
            else
              # Specific function source changed on an automated push/PR (no
              # _shared fanout). Each deployed function's OWN source changed, so
              # a successful deploy MUST advance its version — enable the strict
              # no-op gate. (This is the only path that has ever produced the
              # silent no-op in production.)
              STRICT=true
              mapfile -t FUNC_DIRS < <(
                echo "${CHANGED:-}" \
                  | sed -n 's|^supabase/functions/\([^/]*\)/.*|\1|p' \
                  | sort -u
              )
              for name in "${FUNC_DIRS[@]}"; do
                if is_valid_function "$name"; then
                  FUNCS+=("$name")
                fi
              done
            fi
          fi

          if [ "${#FUNCS[@]}" -eq 0 ]; then
            echo "No functions to deploy."
            echo "has_work=false" >> "$GITHUB_OUTPUT"
            echo "target=$TARGET" >> "$GITHUB_OUTPUT"
            echo 'functions=[]' >> "$GITHUB_OUTPUT"
            echo "strict=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Edge Function Deploy — no-op"
              echo ""
              echo "No functions changed, nothing to deploy."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          JSON=$(printf '%s\n' "${FUNCS[@]}" | jq -R . | jq -cs .)
          echo "has_work=true" >> "$GITHUB_OUTPUT"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "functions=$JSON" >> "$GITHUB_OUTPUT"
          echo "strict=$STRICT" >> "$GITHUB_OUTPUT"

          {
            echo "## Edge Function Deploy Plan"
            echo ""
            echo "- **Event:** \`$EVENT_NAME\`"
            echo "- **Target:** \`$TARGET\`"
            echo "- **Strict no-op gate:** \`$STRICT\`"
            echo "- **Functions (${#FUNCS[@]}):**"
            for f in "${FUNCS[@]}"; do
              echo "  - \`$f\`"
            done
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-test:
    name: Deploy to TEST — ${{ matrix.function }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has_work == 'true' && needs.detect-changes.outputs.target == 'test'
    runs-on: ubuntu-latest
    # Typical deploy is ~30s; cap at 10 min so a hung CLI / network stall
    # surfaces quickly instead of consuming the GH Actions 360-min default.
    timeout-minutes: 10
    strategy:
      fail-fast: false
      # Serialized (was 4): deploy + post-deploy verify run one function at a
      # time so a silent no-op is caught before the next function deploys and
      # the per-function logs stay legible. fail-fast stays false so one
      # function failing still lets the rest deploy + verify.
      max-parallel: 1
      matrix:
        function: ${{ fromJSON(needs.detect-changes.outputs.functions) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest
          github-token: ${{ github.token }}

      - name: Capture pre-deploy version — ${{ matrix.function }} (TEST)
        id: pre
        # Record the function's current deployed version BEFORE deploying so
        # the post-deploy step can assert it advanced. This is what catches the
        # recurring "CLI reports success but the function never changed" silent
        # no-op (seen on complete-review x2 and password-reset x1) — the
        # version (and source) stays frozen on a no-op.
        env:
          FUNCTION_NAME: ${{ matrix.function }}
          PROJECT_REF: rxgajgmphciuaqzvwmox
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          code=$(curl -sS --retry 3 --retry-all-errors -o /tmp/pre.json -w '%{http_code}' \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$PROJECT_REF/functions/$FUNCTION_NAME") || code=000
          if [ "$code" = "200" ]; then
            ver=$(jq -r '.version // empty' /tmp/pre.json)
            case "$ver" in
              ''|*[!0-9]*)
                echo "::error::Pre-deploy API returned HTTP 200 but no numeric version for $FUNCTION_NAME (got '${ver:-<empty>}') — cannot establish a baseline to verify the deploy."
                cat /tmp/pre.json 2>/dev/null || true
                exit 1
                ;;
            esac
            echo "Pre-deploy version: $ver"
            echo "version=$ver" >> "$GITHUB_OUTPUT"
          elif [ "$code" = "404" ]; then
            echo "Function not yet deployed (HTTP 404) — treating as first deploy."
            echo "version=none" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Failed to read pre-deploy version for $FUNCTION_NAME (HTTP $code)"
            cat /tmp/pre.json 2>/dev/null || true
            exit 1
          fi

      - name: Deploy ${{ matrix.function }} to TEST
        # --no-verify-jwt: the Supabase edge runtime doesn't enforce a JWT
        # on inbound requests; each function authenticates internally
        # (anon key context, service-role admin client, or webhook signature
        # as appropriate). Keep this aligned with the legacy deploy script.
        #
        # FUNCTION_NAME is passed via env (not template-substituted into the
        # run script) per GitHub's published guidance for handling values
        # that originate from workflow inputs / API outputs.
        env:
          FUNCTION_NAME: ${{ matrix.function }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy "$FUNCTION_NAME" \
            --project-ref rxgajgmphciuaqzvwmox \
            --no-verify-jwt

      - name: Verify deploy advanced the version — ${{ matrix.function }} (TEST)
        # Automated equivalent of the manual 3-signal post-deploy check: confirm
        # the function is ACTIVE and its deployed version advanced past the
        # pre-deploy snapshot. Supabase only bumps `version` (and ezbr_sha256)
        # when the bundled SOURCE changes, so "did not advance" means the deploy
        # changed nothing. The detect-changes `strict` flag is true only for
        # automated push/PR deploys of specific changed functions — where the
        # source DID change, so a frozen version is a real silent no-op and we
        # fail loudly. For manual dispatch and _shared fanouts (redeploying
        # identical content is expected) it warns instead of failing.
        #
        # Caveat: `version` is a project-level counter. With the serialized
        # matrix this reliably attributes the bump to this run, but a
        # *concurrent* deploy of the same function from a different trigger
        # (push and manual dispatch use separate concurrency groups by design)
        # could advance it inside this window. That rare case is still covered
        # by the manual post-deploy source check (ezbr_sha256 vs TEST + a source
        # grep), which remains the belt-and-braces verification.
        env:
          FUNCTION_NAME: ${{ matrix.function }}
          PROJECT_REF: rxgajgmphciuaqzvwmox
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PRE_VERSION: ${{ steps.pre.outputs.version }}
          STRICT: ${{ needs.detect-changes.outputs.strict }}
        run: |
          set -euo pipefail
          post=""
          status=""
          # Poll briefly: the Management API can lag the CLI deploy by a moment.
          for attempt in 1 2 3 4 5; do
            code=$(curl -sS --retry 3 --retry-all-errors -o /tmp/post.json -w '%{http_code}' \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              "https://api.supabase.com/v1/projects/$PROJECT_REF/functions/$FUNCTION_NAME") || code=000
            if [ "$code" = "200" ]; then
              post=$(jq -r '.version // empty' /tmp/post.json)
              status=$(jq -r '.status // empty' /tmp/post.json)
              # Require BOTH before breaking: a 200 carrying a version but no
              # status would otherwise break early and fail the ACTIVE check
              # with a blank status. Keep polling until the record is complete.
              [ -n "$post" ] && [ -n "$status" ] && break
            fi
            echo "Attempt $attempt: HTTP $code (version='${post:-}')."
            [ "$attempt" -lt 5 ] && sleep 5
          done
          if [ -z "$post" ]; then
            echo "::error::Could not read post-deploy version for $FUNCTION_NAME"
            exit 1
          fi
          echo "Post-deploy: version=$post status=$status (pre=$PRE_VERSION)"
          if [ "$status" != "ACTIVE" ]; then
            echo "::error::$FUNCTION_NAME is not ACTIVE after deploy (status=$status)"
            exit 1
          fi
          case "$post" in
            ''|*[!0-9]*) echo "::error::Non-numeric post-deploy version '$post' for $FUNCTION_NAME"; exit 1 ;;
          esac
          if [ "$PRE_VERSION" = "none" ]; then
            echo "✅ First deploy of $FUNCTION_NAME registered version $post."
          else
            # Belt-and-braces: the pre-deploy step already fails on a 200 with no
            # numeric version, so PRE_VERSION here is numeric or "none" (handled
            # above). Unreachable by design, but keeps the integer compare below
            # safe if the pre-step logic ever changes.
            case "$PRE_VERSION" in
              ''|*[!0-9]*)
                echo "::error::Pre-deploy version '$PRE_VERSION' is not numeric — cannot verify the increment for $FUNCTION_NAME."
                exit 1
                ;;
            esac
            if [ "$post" -gt "$PRE_VERSION" ]; then
              echo "✅ $FUNCTION_NAME version advanced $PRE_VERSION → $post — deploy is real."
            elif [ "$STRICT" = "true" ]; then
              echo "::error::SILENT NO-OP — $FUNCTION_NAME version did not advance (pre=$PRE_VERSION, post=$post) on an automated deploy of changed source. The CLI reported success but the deployed function did not change. Re-dispatch with: gh workflow run deploy-edge-functions.yml -f environment=test -f function=$FUNCTION_NAME"
              exit 1
            else
              echo "::warning::$FUNCTION_NAME version did not advance (pre=$PRE_VERSION, post=$post). Expected when redeploying identical source (manual dispatch) or a _shared fanout that did not change this function's bundle — not treated as a no-op. If this deploy was meant to change the function, confirm via the manual source check."
            fi
          fi

  # Single approval gate for the whole PROD deploy. Without this, every
  # matrix-expanded `deploy-prod` job would request its own approval —
  # up to one click per function, which is bad UX for full-suite deploys
  # (e.g. _shared/** changes). The gate runs once, then the matrix runs
  # without per-job approval.
  gate-prod:
    # The job display name shows up in the "Review pending deployments"
    # approval prompt. Surfacing the trigger here so the approver can see
    # at a glance whether this is a normal main-push deploy or a manual
    # dispatch that bypassed the TEST stage.
    name: ${{ github.event_name == 'workflow_dispatch' && 'Approve PROD Deploy ⚠️ manual dispatch — TEST bypassed' || 'Approve PROD Deploy' }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has_work == 'true' && needs.detect-changes.outputs.target == 'production'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://supabase.com/dashboard/project/jxlxtzkmicfhchkhiojz/functions
    steps:
      - name: Record approval
        env:
          FUNCTIONS: ${{ needs.detect-changes.outputs.functions }}
          TRIGGER: ${{ github.event_name }}
        run: |
          {
            echo "## ✅ PROD Deploy Approved"
            echo ""
            echo "- **Trigger:** \`$TRIGGER\`"
            if [ "$TRIGGER" = "workflow_dispatch" ]; then
              echo "- ⚠️ Manual dispatch — these functions did not auto-deploy to TEST first."
            fi
            echo "- **Functions:** \`$FUNCTIONS\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-prod:
    name: Deploy to PROD — ${{ matrix.function }}
    needs: [detect-changes, gate-prod]
    if: needs.detect-changes.outputs.has_work == 'true' && needs.detect-changes.outputs.target == 'production'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      # Serialized (was 4): deploy + post-deploy verify run one function at a
      # time so a silent no-op is caught before the next function deploys and
      # the per-function logs stay legible. fail-fast stays false so one
      # function failing still lets the rest deploy + verify.
      max-parallel: 1
      matrix:
        function: ${{ fromJSON(needs.detect-changes.outputs.functions) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest
          github-token: ${{ github.token }}

      - name: Capture pre-deploy version — ${{ matrix.function }} (PROD)
        id: pre
        # See deploy-test: record the current PROD version before deploying so
        # the post-deploy step can assert it advanced (catches the silent no-op
        # that recurred on the PROD matrix push — complete-review PR #465/#516).
        env:
          FUNCTION_NAME: ${{ matrix.function }}
          PROJECT_REF: jxlxtzkmicfhchkhiojz
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          code=$(curl -sS --retry 3 --retry-all-errors -o /tmp/pre.json -w '%{http_code}' \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$PROJECT_REF/functions/$FUNCTION_NAME") || code=000
          if [ "$code" = "200" ]; then
            ver=$(jq -r '.version // empty' /tmp/pre.json)
            case "$ver" in
              ''|*[!0-9]*)
                echo "::error::Pre-deploy API returned HTTP 200 but no numeric version for $FUNCTION_NAME (got '${ver:-<empty>}') — cannot establish a baseline to verify the deploy."
                cat /tmp/pre.json 2>/dev/null || true
                exit 1
                ;;
            esac
            echo "Pre-deploy version: $ver"
            echo "version=$ver" >> "$GITHUB_OUTPUT"
          elif [ "$code" = "404" ]; then
            echo "Function not yet deployed (HTTP 404) — treating as first deploy."
            echo "version=none" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Failed to read pre-deploy version for $FUNCTION_NAME (HTTP $code)"
            cat /tmp/pre.json 2>/dev/null || true
            exit 1
          fi

      - name: Deploy ${{ matrix.function }} to PROD
        # See deploy-test for --no-verify-jwt + env-passing rationale.
        env:
          FUNCTION_NAME: ${{ matrix.function }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy "$FUNCTION_NAME" \
            --project-ref jxlxtzkmicfhchkhiojz \
            --no-verify-jwt

      - name: Verify deploy advanced the version — ${{ matrix.function }} (PROD)
        # See deploy-test: assert the PROD version advanced past the pre-deploy
        # snapshot and the function is ACTIVE; fail loudly on a silent no-op.
        env:
          FUNCTION_NAME: ${{ matrix.function }}
          PROJECT_REF: jxlxtzkmicfhchkhiojz
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PRE_VERSION: ${{ steps.pre.outputs.version }}
          STRICT: ${{ needs.detect-changes.outputs.strict }}
        run: |
          set -euo pipefail
          post=""
          status=""
          # Poll briefly: the Management API can lag the CLI deploy by a moment.
          for attempt in 1 2 3 4 5; do
            code=$(curl -sS --retry 3 --retry-all-errors -o /tmp/post.json -w '%{http_code}' \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              "https://api.supabase.com/v1/projects/$PROJECT_REF/functions/$FUNCTION_NAME") || code=000
            if [ "$code" = "200" ]; then
              post=$(jq -r '.version // empty' /tmp/post.json)
              status=$(jq -r '.status // empty' /tmp/post.json)
              # Require BOTH before breaking: a 200 carrying a version but no
              # status would otherwise break early and fail the ACTIVE check
              # with a blank status. Keep polling until the record is complete.
              [ -n "$post" ] && [ -n "$status" ] && break
            fi
            echo "Attempt $attempt: HTTP $code (version='${post:-}')."
            [ "$attempt" -lt 5 ] && sleep 5
          done
          if [ -z "$post" ]; then
            echo "::error::Could not read post-deploy version for $FUNCTION_NAME"
            exit 1
          fi
          echo "Post-deploy: version=$post status=$status (pre=$PRE_VERSION)"
          if [ "$status" != "ACTIVE" ]; then
            echo "::error::$FUNCTION_NAME is not ACTIVE after deploy (status=$status)"
            exit 1
          fi
          case "$post" in
            ''|*[!0-9]*) echo "::error::Non-numeric post-deploy version '$post' for $FUNCTION_NAME"; exit 1 ;;
          esac
          if [ "$PRE_VERSION" = "none" ]; then
            echo "✅ First deploy of $FUNCTION_NAME registered version $post."
          else
            # Belt-and-braces: the pre-deploy step already fails on a 200 with no
            # numeric version, so PRE_VERSION here is numeric or "none" (handled
            # above). Unreachable by design, but keeps the integer compare below
            # safe if the pre-step logic ever changes.
            case "$PRE_VERSION" in
              ''|*[!0-9]*)
                echo "::error::Pre-deploy version '$PRE_VERSION' is not numeric — cannot verify the increment for $FUNCTION_NAME."
                exit 1
                ;;
            esac
            if [ "$post" -gt "$PRE_VERSION" ]; then
              echo "✅ $FUNCTION_NAME version advanced $PRE_VERSION → $post — deploy is real."
            elif [ "$STRICT" = "true" ]; then
              echo "::error::SILENT NO-OP — $FUNCTION_NAME version did not advance (pre=$PRE_VERSION, post=$post) on an automated deploy of changed source. The CLI reported success but the deployed function did not change. Re-dispatch with: gh workflow run deploy-edge-functions.yml -f environment=production -f function=$FUNCTION_NAME"
              exit 1
            else
              echo "::warning::$FUNCTION_NAME version did not advance (pre=$PRE_VERSION, post=$post). Expected when redeploying identical source (manual dispatch) or a _shared fanout that did not change this function's bundle — not treated as a no-op. If this deploy was meant to change the function, confirm via the manual source check."
            fi
          fi

  report:
    name: Post Deploy Summary
    needs: [detect-changes, deploy-test, deploy-prod]
    if: always() && needs.detect-changes.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Compute status
        id: status
        env:
          TEST_RESULT: ${{ needs.deploy-test.result }}
          PROD_RESULT: ${{ needs.deploy-prod.result }}
          TARGET: ${{ needs.detect-changes.outputs.target }}
        run: |
          if [ "$TARGET" = "test" ]; then
            RESULT="$TEST_RESULT"
          else
            RESULT="$PROD_RESULT"
          fi
          case "$RESULT" in
            success) ICON="✅"; STATUS="succeeded" ;;
            skipped) ICON="⏭️"; STATUS="skipped (awaiting approval?)" ;;
            *)       ICON="❌"; STATUS="failed or cancelled" ;;
          esac
          echo "icon=$ICON" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Write job summary
        env:
          ICON: ${{ steps.status.outputs.icon }}
          STATUS: ${{ steps.status.outputs.status }}
          TARGET: ${{ needs.detect-changes.outputs.target }}
          FUNCTIONS: ${{ needs.detect-changes.outputs.functions }}
        run: |
          {
            echo "## Edge Function Deploy — $ICON $STATUS"
            echo ""
            echo "- **Target:** \`$TARGET\`"
            echo "- **Functions:** \`$FUNCTIONS\`"
            echo ""
            echo "See the individual matrix job logs above for per-function output."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post or update PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          ICON: ${{ steps.status.outputs.icon }}
          STATUS: ${{ steps.status.outputs.status }}
          TARGET: ${{ needs.detect-changes.outputs.target }}
          FUNCTIONS: ${{ needs.detect-changes.outputs.functions }}
        with:
          script: |
            const { ICON, STATUS, TARGET, FUNCTIONS } = process.env;
            const funcs = JSON.parse(FUNCTIONS);
            const marker = '<!-- deploy-edge-functions-comment -->';
            const body = [
              marker,
              `### Edge Function Deploy — ${ICON} ${STATUS}`,
              ``,
              `- **Target:** \`${TARGET}\``,
              `- **Functions (${funcs.length}):**`,
              ...funcs.map(f => `  - \`${f}\``),
              ``,
              `<sub>Last run: commit ${context.payload.pull_request.head.sha.slice(0, 7)} via \`deploy-edge-functions.yml\`</sub>`,
            ].join('\n');

            const existing = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              },
            );
            const prior = existing.find(c => c.body && c.body.includes(marker));

            if (prior) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prior.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

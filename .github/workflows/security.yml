name: Security & Dependencies

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  push:
    branches: [ main, cleanup/main ]
  pull_request:
    branches: [ main, cleanup/main ]

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Setup Node.js
      uses: actions/setup-node@v7
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci

    # Blocking gate: fail only on vulnerabilities in PRODUCTION dependencies —
    # the code that actually ships to users' browsers. devDependencies (vite,
    # vitest, @lhci/cli, eslint, …) run only locally and in CI and are never
    # served, so a transitive advisory there has no production exploit surface.
    # This is the check that gates a merge.
    - name: Security audit (production dependencies — blocking)
      run: npm audit --omit=dev --audit-level=high

    # Visibility only: a full-tree audit (incl. devDependencies) is printed to
    # the log on every run but never blocks a merge. As of 2026-06 the only
    # remaining advisories are transitive deps of @lhci/cli@0.15.1 (the latest
    # release; it still ships old tmp/uuid with no upstream fix) — all dev-only
    # with no ship path. Review this log periodically; promote anything that
    # reaches production into the blocking gate above.
    - name: Security audit (full tree — informational, non-blocking)
      run: npm audit --audit-level=moderate
      continue-on-error: true

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Dependency Review
      uses: actions/dependency-review-action@v5
      with:
        fail-on-severity: moderate
        
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    
    permissions:
      actions: read
      contents: read
      security-events: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: javascript
        
    - name: Autobuild
      uses: github/codeql-action/autobuild@v3
      
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
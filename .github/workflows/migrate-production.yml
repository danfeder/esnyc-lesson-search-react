name: Production Database Migration

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**/*.sql'

# Prevent concurrent production migrations
concurrency:
  group: migrate-production
  cancel-in-progress: false

jobs:
  check-migrations:
    name: Check Migration Changes
    runs-on: ubuntu-latest
    outputs:
      has_migrations: ${{ steps.check.outputs.has_migrations }}
      migration_files: ${{ steps.check.outputs.migration_files }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check for new migrations
        id: check
        run: |
          # Handle edge cases: initial commits, force pushes, squash merges
          set +e
          MIGRATION_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep "supabase/migrations/.*\.sql$")
          DIFF_EXIT_CODE=$?
          set -e

          # Fallback: check all migration files if diff fails or returns empty
          if [ $DIFF_EXIT_CODE -ne 0 ] || [ -z "$MIGRATION_FILES" ]; then
            echo "Git diff returned no results, this workflow was triggered by path filter so migrations exist"
            MIGRATION_FILES=$(git ls-files "supabase/migrations/**/*.sql" 2>/dev/null || true)
          fi

          if [ -n "$MIGRATION_FILES" ]; then
            echo "has_migrations=true" >> $GITHUB_OUTPUT
            echo "migration_files<<EOF" >> $GITHUB_OUTPUT
            echo "$MIGRATION_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "📦 New migrations detected:"
            echo "$MIGRATION_FILES"
          else
            echo "has_migrations=false" >> $GITHUB_OUTPUT
            echo "No new migrations in this push"
          fi

  verify-backup:
    name: Verify Recent Backup
    needs: check-migrations
    if: needs.check-migrations.outputs.has_migrations == 'true'
    runs-on: ubuntu-latest
    permissions:
      # Read workflow runs + artifact metadata for backup-production.yml.
      # No `contents` needed — this job doesn't checkout the repo.
      actions: read
    steps:
      - name: Check most recent backup is fresh (< 7 days)
        # We're on Supabase free tier — no PITR. The weekly artifact from
        # backup-production.yml is the only recovery mechanism if a migration
        # corrupts data. Block production migrations when the latest backup
        # is stale so the approver can trigger a fresh backup before applying.
        env:
          GH_TOKEN: ${{ github.token }}
          MAX_AGE_DAYS: '7'
        run: |
          set -euo pipefail

          LATEST_RUN_ID=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/backup-production.yml/runs?status=success&per_page=1" \
            --jq '.workflow_runs[0].id // empty')

          if [ -z "$LATEST_RUN_ID" ]; then
            {
              echo "## ❌ Backup freshness check failed"
              echo ""
              echo "No successful \`backup-production.yml\` run found."
              echo ""
              echo "Trigger a backup before re-running this workflow:"
              echo ""
              echo '```bash'
              echo "gh workflow run backup-production.yml"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::No successful backup-production.yml run found."
            exit 1
          fi

          # Artifact created_at is the source of truth — workflow created_at
          # can be skewed by long-running steps or retries.
          ARTIFACT_DATE=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${LATEST_RUN_ID}/artifacts" \
            --jq '[.artifacts[] | select(.name | startswith("prod-backup-")) | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].created_at // empty')

          if [ -z "$ARTIFACT_DATE" ]; then
            {
              echo "## ❌ Backup freshness check failed"
              echo ""
              echo "Latest backup run [#${LATEST_RUN_ID}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${LATEST_RUN_ID}) succeeded but its artifact is missing or expired."
              echo ""
              echo "Trigger a fresh backup: \`gh workflow run backup-production.yml\`"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Latest backup artifact missing or expired."
            exit 1
          fi

          ARTIFACT_EPOCH=$(date -d "$ARTIFACT_DATE" +%s)
          NOW_EPOCH=$(date +%s)
          AGE_DAYS=$(( (NOW_EPOCH - ARTIFACT_EPOCH) / 86400 ))

          {
            echo "## 📦 Backup freshness check"
            echo ""
            echo "- **Latest successful run:** [#${LATEST_RUN_ID}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${LATEST_RUN_ID})"
            echo "- **Artifact created:** \`${ARTIFACT_DATE}\` (${AGE_DAYS} days ago)"
            echo "- **Threshold:** ${MAX_AGE_DAYS} days"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$AGE_DAYS" -gt "$MAX_AGE_DAYS" ]; then
            {
              echo ""
              echo "❌ **Stale backup — production migration blocked.**"
              echo ""
              echo "Trigger a fresh backup, then re-run this workflow:"
              echo ""
              echo '```bash'
              echo "gh workflow run backup-production.yml"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Most recent production backup is ${AGE_DAYS} days old (threshold: ${MAX_AGE_DAYS} days). Trigger backup-production.yml manually before merging."
            exit 1
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ Backup is fresh." >> "$GITHUB_STEP_SUMMARY"

  dry-run:
    name: Migration Dry Run
    needs: check-migrations
    if: needs.check-migrations.outputs.has_migrations == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # github-script needs write to comment on the PR that brought this
      # commit to main. listPullRequestsAssociatedWithCommit is read-only.
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to production project
        run: supabase link --project-ref jxlxtzkmicfhchkhiojz
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Show pending migrations (dry-run)
        id: dry-run
        run: |
          mkdir -p /tmp/migration-report
          echo "## 🔍 Pending Migrations for PRODUCTION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Migration Files Changed:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ needs.check-migrations.outputs.migration_files }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Dry Run Output:" >> $GITHUB_STEP_SUMMARY
          echo '```sql' >> $GITHUB_STEP_SUMMARY
          # Capture for the PR-comment step. tee both to summary and the file.
          supabase db push --dry-run 2>&1 | tee /tmp/migration-report/dry-run.txt
          cat /tmp/migration-report/dry-run.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏸️ **Waiting for manual approval before applying to production...**" >> $GITHUB_STEP_SUMMARY
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Post dry-run as comment on the merged PR
        # Find the PR that brought this commit to main and surface the dry-run
        # there. Approver gets a notification on that PR; reviewing the diff
        # next to the migrations is faster than digging through workflow logs.
        # Default if-success() means this only runs when dry-run produced output.
        # continue-on-error: a transient GitHub API hiccup (rate limit,
        # listPullRequests flake) must NOT block apply-migrations downstream.
        # The dry-run is already in the workflow step summary; the PR comment
        # is purely a convenience surface.
        continue-on-error: true
        env:
          # Pass migration_files via env (not template interpolation) so any
          # special characters in filenames can't break the JS parser. Same
          # pattern deploy-edge-functions.yml uses for matrix.function values.
          MIGRATION_FILES: ${{ needs.check-migrations.outputs.migration_files }}
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const dryRunPath = '/tmp/migration-report/dry-run.txt';
            const dryRun = fs.existsSync(dryRunPath)
              ? fs.readFileSync(dryRunPath, 'utf8')
              : '(dry-run did not produce output)';
            const migrationFiles = process.env.MIGRATION_FILES || '';

            // Find the PR associated with this push. Squash-merges on main set
            // exactly one PR; merge-commits include both the PR and any others
            // that touch the SHA — first match is the right one for our use.
            const pulls = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            if (!pulls.data.length) {
              core.info('No PR associated with this commit; skipping PR comment.');
              return;
            }
            const prNumber = pulls.data[0].number;

            const marker = '<!-- migrate-production-dry-run-comment -->';
            const MAX = 30000;
            const truncated = dryRun.length > MAX;
            const shown = truncated
              ? dryRun.slice(0, MAX) + `\n\n... (truncated, ${dryRun.length - MAX} chars; full output in workflow logs)`
              : dryRun;
            const body = [
              marker,
              `### 🚀 PROD DB — pending migrations (dry-run, awaiting approval)`,
              ``,
              `**Migration files:**`,
              '```',
              migrationFiles.trim() || '(none reported)',
              '```',
              ``,
              `**Dry-run output:**`,
              '```sql',
              shown.trim() || '(no output captured)',
              '```',
              ``,
              `<sub>From \`migrate-production.yml\` · commit ${context.sha.slice(0, 7)} · [run logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})</sub>`,
            ].join('\n');

            const existing = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100,
              },
            );
            const prior = existing.find(c => c.body && c.body.includes(marker));
            if (prior) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prior.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  apply-migrations:
    name: Apply to Production
    needs: [check-migrations, dry-run, verify-backup]
    if: needs.check-migrations.outputs.has_migrations == 'true'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://supabase.com/dashboard/project/jxlxtzkmicfhchkhiojz
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to production project
        run: supabase link --project-ref jxlxtzkmicfhchkhiojz
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply migrations to PRODUCTION
        run: |
          echo "## ✅ Applying Migrations to PRODUCTION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          supabase db push 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify migration success
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 Current Migration Status" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          supabase migration list 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Production migrations complete!**" >> $GITHUB_STEP_SUMMARY
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

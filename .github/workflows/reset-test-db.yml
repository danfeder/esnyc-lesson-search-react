name: Reset Test Database

# Database connection details (password stored in TEST_DB_PASSWORD secret)
env:
  TEST_DB_HOST: aws-0-us-east-2.pooler.supabase.com
  TEST_DB_PORT: 6543
  TEST_DB_USER: postgres.rxgajgmphciuaqzvwmox
  TEST_DB_NAME: postgres

on:
  workflow_dispatch:
    inputs:
      reset_type:
        description: 'Type of reset to perform'
        required: true
        default: 'migrations'
        type: choice
        options:
          - migrations
          - full
      confirm:
        description: 'Type "RESET" to confirm'
        required: true
        type: string
  # Weekly auto-sync of TEST data from PROD. Sunday 04:00 UTC is well off
  # the Monday 10:00 UTC backup cron (no shared rate-limit risk on the same
  # Supabase project), and runs while the team is unlikely to be using TEST
  # for active dev. Always uses reset_type=full so TEST tracks PROD data.
  schedule:
    - cron: '0 4 * * 0'

# Avoid two reset jobs writing to TEST at the same time (e.g. cron firing
# during an in-flight manual reset).
concurrency:
  group: reset-test-db
  cancel-in-progress: false

permissions:
  # `issues: write` is used by the on-failure step to file a GitHub issue
  # if the cron run fails — silent cron failures would let TEST drift from
  # PROD indefinitely without anyone noticing.
  issues: write

jobs:
  validate:
    name: Validate Reset Request
    # Cron has no `inputs.confirm` to type-check; the schedule itself is
    # the authorization gate. Only require the typed-RESET on manual runs.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: inputs.confirm != 'RESET'
        run: |
          echo "❌ Reset not confirmed. You must type 'RESET' to proceed."
          exit 1

  reset-migrations:
    name: Reset Migrations
    needs: validate
    # Only the manual `migrations` mode runs here — cron always runs full.
    if: github.event_name == 'workflow_dispatch' && inputs.reset_type == 'migrations'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
          github-token: ${{ github.token }}

      - name: Link to test project
        run: supabase link --project-ref rxgajgmphciuaqzvwmox
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Show current migration status
        run: |
          echo "## 📋 Current Migration Status (Before Reset)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          supabase migration list 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Repair migration history
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🔧 Repairing Migration History" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          supabase migration repair --status applied 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push all migrations
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🚀 Pushing All Migrations" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          supabase db push 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Show final migration status
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ Migration Status (After Reset)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          supabase migration list 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Test database migrations reset complete!**" >> $GITHUB_STEP_SUMMARY
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  reset-full:
    name: Full Reset (Schema + Data)
    needs: validate
    # Run when the manual user picks `full`, OR when the weekly cron fires.
    # `always() && needs.validate.result != 'failure'` lets this proceed when
    # validate is skipped on the cron path (skip-on-needs-skipped is the
    # default behavior we're explicitly overriding here).
    if: |
      always() && needs.validate.result != 'failure' && needs.validate.result != 'cancelled' &&
      ((github.event_name == 'workflow_dispatch' && inputs.reset_type == 'full') || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
          github-token: ${{ github.token }}

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Link to production (for dump)
        run: supabase link --project-ref jxlxtzkmicfhchkhiojz
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Dump production data
        run: |
          echo "## 📦 Dumping Production Data" >> $GITHUB_STEP_SUMMARY
          supabase db dump --data-only -f /tmp/prod_data.sql
          echo "Dumped $(wc -l < /tmp/prod_data.sql) lines of data" >> $GITHUB_STEP_SUMMARY
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Link to test project
        run: supabase link --project-ref rxgajgmphciuaqzvwmox
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations to test
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🔧 Applying Migrations to Test DB" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          supabase db push 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Restore data to test database
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📥 Restoring Data to Test DB" >> $GITHUB_STEP_SUMMARY

          # Use environment variables for connection details
          PGPASSWORD="${{ secrets.TEST_DB_PASSWORD }}" psql \
            "postgresql://${TEST_DB_USER}@${TEST_DB_HOST}:${TEST_DB_PORT}/${TEST_DB_NAME}" \
            -f /tmp/prod_data.sql 2>&1 | head -50 | tee -a $GITHUB_STEP_SUMMARY || true

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Full reset complete!**" >> $GITHUB_STEP_SUMMARY

      - name: Verify lesson count
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Verification" >> $GITHUB_STEP_SUMMARY

          LESSON_COUNT=$(PGPASSWORD="${{ secrets.TEST_DB_PASSWORD }}" psql \
            "postgresql://${TEST_DB_USER}@${TEST_DB_HOST}:${TEST_DB_PORT}/${TEST_DB_NAME}" \
            -t -c "SELECT COUNT(*) FROM lessons;" 2>/dev/null || echo "unknown")

          echo "Lesson count in test DB: $LESSON_COUNT" >> $GITHUB_STEP_SUMMARY

  report-cron-failure:
    name: Report Cron Failure
    needs: reset-full
    # Only file an issue when the WEEKLY CRON fails. Manual runs surface
    # failures directly to the user who triggered them; cron failures go
    # silent without an explicit notification.
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: File GitHub issue
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `⚠️ Weekly TEST DB sync failed (${new Date().toISOString().slice(0, 10)})`;
            const body = [
              `The weekly TEST DB auto-sync (\`reset-test-db.yml --reset_type=full\` via cron) failed.`,
              ``,
              `- Workflow run: ${runUrl}`,
              `- Trigger: \`${context.eventName}\``,
              ``,
              `Until this is fixed, the TEST database may drift from PROD —`,
              `manual edits or migrations applied via PR will accumulate without`,
              `the expected weekly resync. Investigate the run logs, then re-run`,
              `the workflow manually with \`reset_type=full\` once fixed.`,
              ``,
              `Close this issue once a successful sync has run.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['data-integrity', 'monitoring'],
            });

name: E2E Tests

on:
  pull_request:
    branches: [main]

permissions:
  # contents: read is the default for pull_request, but we need pull-requests:
  # write to post the dry-run + schema-diff PR comments.
  contents: read
  pull-requests: write

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # 25 (was 15): the 77-test suite takes 11.5–15+ min end-to-end depending on
    # runner speed — three 15-min timeout kills on 2026-07-04 alone (PRs #605/#606),
    # and a mid-suite kill strands published fixtures on the TEST DB that poison
    # later runs' duplicate detection.
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Check for migration changes
        id: migration-check
        uses: dorny/paths-filter@v4
        with:
          filters: |
            migrations:
              - 'supabase/migrations/**/*.sql'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        if: steps.migration-check.outputs.migrations == 'true'
        uses: supabase/setup-cli@v2
        with:
          version: latest
          github-token: ${{ github.token }}

      - name: Show pending migrations (dry-run)
        if: steps.migration-check.outputs.migrations == 'true'
        run: |
          # pipefail: a failing `supabase db push --dry-run` must NOT be
          # masked by `tee` returning 0 (see migrate-production.yml for
          # the incident this prevents).
          set -o pipefail
          mkdir -p /tmp/migration-report
          echo "## 🔍 Pending Migrations for TEST Database" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Capture into a file so the next step can post it as a PR comment
          # without re-running the dry-run.
          supabase db push --dry-run --db-url "postgresql://postgres.rxgajgmphciuaqzvwmox:${SUPABASE_DB_PASSWORD}@aws-1-us-east-2.pooler.supabase.com:5432/postgres" 2>&1 | tee /tmp/migration-report/dry-run.txt
          cat /tmp/migration-report/dry-run.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_TEST }}

      - name: Post dry-run as PR comment
        if: steps.migration-check.outputs.migrations == 'true'
        # Informational only — a transient API hiccup must not fail the e2e
        # job and block PR merging. The dry-run is also in the step summary.
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const dryRunPath = '/tmp/migration-report/dry-run.txt';
            const dryRun = fs.existsSync(dryRunPath)
              ? fs.readFileSync(dryRunPath, 'utf8')
              : '(dry-run did not produce output)';
            const marker = '<!-- e2e-migration-dry-run-comment -->';
            // Truncate to keep under GitHub's ~65 KB comment limit with headroom.
            const MAX = 30000;
            let body = dryRun.length > MAX
              ? dryRun.slice(0, MAX) + `\n\n... (truncated, ${dryRun.length - MAX} chars)`
              : dryRun;
            const comment = [
              marker,
              `### 🔍 TEST DB — pending migrations (dry-run)`,
              ``,
              '```',
              body.trim() || '(no output captured)',
              '```',
              ``,
              `<sub>From \`e2e.yml\` · commit ${context.payload.pull_request.head.sha.slice(0, 7)}</sub>`,
            ].join('\n');

            const existing = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              },
            );
            const prior = existing.find(c => c.body && c.body.includes(marker));
            if (prior) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prior.id,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }

      - name: Apply migrations to TEST database
        if: steps.migration-check.outputs.migrations == 'true'
        run: |
          echo "Applying migrations to test database..."
          supabase db push --db-url "postgresql://postgres.rxgajgmphciuaqzvwmox:${SUPABASE_DB_PASSWORD}@aws-1-us-east-2.pooler.supabase.com:5432/postgres"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ Migrations Applied to TEST Database" >> $GITHUB_STEP_SUMMARY
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_TEST }}

      - name: Diff TEST schema vs PROD schema
        # Surfaces unintended schema divergence between TEST and PROD after
        # migrations apply. Read-only — failure here shouldn't block CI.
        if: steps.migration-check.outputs.migrations == 'true'
        id: schema-diff
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # `set -e` so a failing `supabase link`/`dump` aborts instead of
          # generating a misleading diff against a half-written file. The one
          # expected non-zero exit is `diff`, which we run without -e via
          # explicit set toggle. continue-on-error on the step keeps CI green.
          set -euo pipefail
          mkdir -p /tmp/schema-diff

          # Order matters: dump PROD first, then TEST. Leaves the runner's
          # `supabase link` state pointing at TEST so any future step that
          # calls the supabase CLI without explicit --project-ref / --db-url
          # targets the safer environment by default.
          echo "→ Linking PROD and dumping public schema..."
          supabase link --project-ref jxlxtzkmicfhchkhiojz
          supabase db dump --schema public -f /tmp/schema-diff/prod.sql

          echo "→ Linking TEST and dumping public schema..."
          supabase link --project-ref rxgajgmphciuaqzvwmox
          supabase db dump --schema public -f /tmp/schema-diff/test.sql

          # PROD on the left, TEST on the right — diff lines starting with `+`
          # are what TEST has that PROD doesn't (i.e. what the migrations add).
          set +e
          diff -u /tmp/schema-diff/prod.sql /tmp/schema-diff/test.sql > /tmp/schema-diff/diff.txt
          DIFF_EXIT=$?
          set -e

          if [ "$DIFF_EXIT" -eq 0 ]; then
            echo "schema_changed=false" >> "$GITHUB_OUTPUT"
            echo "✅ TEST and PROD public schemas are identical."
            {
              echo ""
              echo "## 🔎 Schema diff: TEST (post-migration) vs PROD"
              echo ""
              echo "✅ \`public\` schemas identical — migrations were a no-op for schema (data-only?)."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "schema_changed=true" >> "$GITHUB_OUTPUT"
            DIFF_LINES=$(wc -l < /tmp/schema-diff/diff.txt)
            echo "diff_lines=$DIFF_LINES" >> "$GITHUB_OUTPUT"
            {
              echo ""
              echo "## 🔎 Schema diff: TEST (post-migration) vs PROD"
              echo ""
              echo "<details><summary>Diff (${DIFF_LINES} lines)</summary>"
              echo ""
              echo '```diff'
              head -n 500 /tmp/schema-diff/diff.txt
              echo '```'
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Post schema diff as PR comment
        if: steps.migration-check.outputs.migrations == 'true' && steps.schema-diff.outcome == 'success'
        # Same rationale as the dry-run comment step: informational only,
        # must not block CI on a transient API hiccup.
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- e2e-schema-diff-comment -->';
            const changed = '${{ steps.schema-diff.outputs.schema_changed }}' === 'true';
            const sha = context.payload.pull_request.head.sha.slice(0, 7);

            let body;
            if (!changed) {
              body = [
                marker,
                `### 🔎 Schema diff: TEST (post-migration) vs PROD`,
                ``,
                `✅ Public schemas are identical. Migrations did not alter \`public\`.`,
                ``,
                `<sub>From \`e2e.yml\` · commit ${sha}</sub>`,
              ].join('\n');
            } else {
              const diff = fs.readFileSync('/tmp/schema-diff/diff.txt', 'utf8');
              const lines = diff.split('\n');
              const MAX_LINES = 500;
              const truncated = lines.length > MAX_LINES;
              const shown = truncated ? lines.slice(0, MAX_LINES).join('\n') : diff;
              body = [
                marker,
                `### 🔎 Schema diff: TEST (post-migration) vs PROD`,
                ``,
                `<details><summary>Diff — ${lines.length} lines${truncated ? ` (showing first ${MAX_LINES})` : ''}</summary>`,
                ``,
                '```diff',
                shown,
                '```',
                ``,
                truncated ? `_Truncated. Full diff in the workflow run logs._` : '',
                `</details>`,
                ``,
                `<sub>From \`e2e.yml\` · commit ${sha}</sub>`,
              ].filter(Boolean).join('\n');
            }

            const existing = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              },
            );
            const prior = existing.find(c => c.body && c.body.includes(marker));
            if (prior) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prior.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Test RLS policies
        if: steps.migration-check.outputs.migrations == 'true'
        run: npm run test:rls
        env:
          VITE_SUPABASE_URL: https://rxgajgmphciuaqzvwmox.supabase.co
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY_TEST }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_TEST }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for Netlify deploy
        uses: JakePartusch/wait-for-netlify-action@v1.4
        id: netlify
        with:
          site_name: esynyc-lessonlibrary-v2
          max_timeout: 300

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.netlify.outputs.url }}
          # T5b authenticated suite: programmatic login + marker-scoped
          # cleanup against the TEST project. Reuses the exact secrets the
          # "Test RLS policies" step above already consumes — no new secrets.
          # The service key stays in the Node test runner (setup/teardown);
          # the browser only ever sees the anon key baked into the preview.
          VITE_SUPABASE_URL: https://rxgajgmphciuaqzvwmox.supabase.co
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY_TEST }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_TEST }}

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
